# ==============================================================================
# Reusable Workflow: SEO checks against a live URL (post-merge / scheduled)
# ==============================================================================
# After deploy: homepage + robots + deep sitemap/content audit (URLs, H1, canonical,
# JSON-LD), optional shallow sitemap HEAD, then Lighthouse (SEO category only).
# Pass repo variable BASE_URL as input `base_url` (e.g. https://neuraltrust.ai).
#
# Usage (on push to main):
#   jobs:
#     seo-live:
#       if: vars.BASE_URL != ''
#       uses: NeuralTrust/workflows/.github/workflows/seo-live-url.yml@main
#       with:
#         base_url: ${{ vars.BASE_URL }}
#         lighthouse_paths: /,/pricing
#         assert_seo_min_score: '0.85'
# ==============================================================================

name: SEO live URL

on:
  workflow_call:
    inputs:
      base_url:
        description: 'Production (or preview) origin, e.g. https://neuraltrust.ai'
        required: true
        type: string
      lighthouse_paths:
        description: 'Comma-separated paths to audit with Lighthouse (always includes / first if omitted)'
        required: false
        type: string
        default: '/'
      assert_seo_min_score:
        description: 'If set (0–1), fail when SEO category score is below this; empty = report only'
        required: false
        type: string
        default: ''
      check_robots:
        description: 'HTTP GET robots.txt and fail if non-2xx'
        required: false
        type: boolean
        default: true
      check_sitemap:
        description: 'HTTP HEAD sitemap.xml (or /sitemap_index.xml) and warn on failure'
        required: false
        type: boolean
        default: false
      content_audit_enabled:
        description: >
          Fetch sitemap(s), validate <loc> URLs (host/scheme), sample HTTP checks,
          audit homepage + lighthouse_paths HTML for H1, canonical, JSON-LD; parse robots Sitemap: line
        required: false
        type: boolean
        default: true
      content_audit_max_url_checks:
        description: 'Max sitemap URLs to HEAD/GET (0 = skip URL reachability checks)'
        required: false
        type: string
        default: '50'
      content_audit_strict:
        description: 'If true, fail job when content audit reports error-level findings'
        required: false
        type: boolean
        default: false
      workflows_ref:
        description: 'Ref for NeuralTrust/workflows checkout (scripts/seo-live-content-audit.mjs)'
        required: false
        type: string
        default: 'main'
      lhci_version:
        required: false
        type: string
        default: '0.14.0'

    secrets:
      GH_TOKEN:
        description: 'Optional PAT to checkout private NeuralTrust/workflows'
        required: false

jobs:
  live:
    name: Lighthouse SEO (live)
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      LHCI_BUILD_CONTEXT__EXTERNAL: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Normalize base URL
        id: base
        env:
          RAW: ${{ inputs.base_url }}
        run: |
          b="${RAW// /}"
          b="${b%/}"
          echo "url=$b" >> "$GITHUB_OUTPUT"

      - name: Probe homepage
        run: |
          set -e
          URL="${{ steps.base.outputs.url }}/"
          echo "GET $URL"
          code=$(curl -sS -o /tmp/home.html -w "%{http_code}" -L "$URL")
          if [ "$code" -lt 200 ] || [ "$code" -ge 400 ]; then
            echo "::error::Homepage returned HTTP $code"
            exit 1
          fi
          echo "Homepage OK ($code), $(wc -c < /tmp/home.html) bytes"

      - name: Probe robots.txt
        if: inputs.check_robots
        run: |
          set -e
          URL="${{ steps.base.outputs.url }}/robots.txt"
          code=$(curl -sS -o /tmp/robots.txt -w "%{http_code}" -L "$URL")
          if [ "$code" -lt 200 ] || [ "$code" -ge 400 ]; then
            echo "::error::robots.txt returned HTTP $code"
            exit 1
          fi
          echo "robots.txt OK ($code)"
          echo "--- head ---"
          head -n 30 /tmp/robots.txt

      - name: Probe sitemap (optional)
        if: inputs.check_sitemap
        continue-on-error: true
        run: |
          for path in /sitemap.xml /sitemap_index.xml; do
            URL="${{ steps.base.outputs.url }}${path}"
            code=$(curl -sS -o /dev/null -w "%{http_code}" -I -L "$URL" || echo "000")
            echo "$path -> $code"
            if [ "$code" = "200" ]; then exit 0; fi
          done
          echo "::warning::No sitemap at /sitemap.xml or /sitemap_index.xml (HEAD not 200)"

      - name: Checkout workflow scripts (content audit)
        if: inputs.content_audit_enabled
        uses: actions/checkout@v5
        with:
          repository: ${{ github.repository_owner }}/workflows
          ref: ${{ inputs.workflows_ref }}
          path: _nt_workflows
          token: ${{ secrets.GH_TOKEN || github.token }}

      - name: Live content audit (sitemap, H1, canonical, JSON-LD, robots)
        if: inputs.content_audit_enabled
        id: content_audit
        run: |
          set +e
          REPORT="${RUNNER_TEMP}/content-audit.md"
          SCRIPT="${GITHUB_WORKSPACE}/_nt_workflows/scripts/seo-live-content-audit.mjs"
          STRICT_ARGS=()
          if [ "${{ inputs.content_audit_strict }}" = "true" ]; then
            STRICT_ARGS=(--strict)
          fi
          node "$SCRIPT" \
            --base-url "${{ steps.base.outputs.url }}" \
            --home-html /tmp/home.html \
            --paths "${{ inputs.lighthouse_paths }}" \
            --max-url-checks "${{ inputs.content_audit_max_url_checks }}" \
            "${STRICT_ARGS[@]}" | tee "$REPORT"
          EC=${PIPESTATUS[0]}
          set -e
          {
            echo ""
            cat "$REPORT"
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$EC"

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@${{ inputs.lhci_version }}

      - name: Write lighthouserc.json
        env:
          BASE: ${{ steps.base.outputs.url }}
          PATHS_CSV: ${{ inputs.lighthouse_paths }}
          ASSERT_MIN: ${{ inputs.assert_seo_min_score }}
        run: |
          python3 <<'PY'
          import json, os

          base = os.environ["BASE"].rstrip("/")
          paths_csv = os.environ["PATHS_CSV"]
          assert_min = os.environ.get("ASSERT_MIN", "").strip()

          paths = [p.strip() for p in paths_csv.split(",") if p.strip()]
          if not paths:
              paths = ["/"]

          urls = []
          for p in paths:
              p = p if p.startswith("/") else "/" + p
              urls.append(base + p)

          cfg = {
              "ci": {
                  "collect": {
                      "url": urls,
                      "numberOfRuns": 1,
                      "settings": {
                          "onlyCategories": ["seo"],
                          "preset": "desktop",
                          "chromeFlags": "--no-sandbox --disable-dev-shm-usage --disable-gpu",
                      },
                  },
                  "upload": {
                      "target": "filesystem",
                      "outputDir": ".lighthouseci",
                  },
              }
          }

          if assert_min:
              m = float(assert_min)
              if m < 0 or m > 1:
                  raise SystemExit("assert_seo_min_score must be between 0 and 1")
              cfg["ci"]["assert"] = {
                  "assertions": {
                      "categories:seo": ["error", {"minScore": m}],
                  }
              }

          with open("lighthouserc.json", "w") as f:
              json.dump(cfg, f, indent=2)
          print(json.dumps(cfg, indent=2))
          PY
        working-directory: ${{ github.workspace }}

      - name: Run Lighthouse CI
        run: |
          export LHCI_BUILD_CONTEXT__EXTERNAL=true
          lhci autorun --config="${GITHUB_WORKSPACE}/lighthouserc.json"

      - name: Summary
        if: always()
        working-directory: ${{ github.workspace }}
        run: |
          {
            echo "## SEO live checks"
            echo ""
            echo "### Configuration"
            echo ""
            echo "- **Base:** \`${{ steps.base.outputs.url }}\`"
            echo "- **Lighthouse paths:** \`${{ inputs.lighthouse_paths }}\`"
            echo "- **robots.txt check:** ${{ inputs.check_robots }}"
            echo "- **sitemap probe (HEAD):** ${{ inputs.check_sitemap }}"
            echo "- **Deep content audit:** ${{ inputs.content_audit_enabled }} (max URL checks: ${{ inputs.content_audit_max_url_checks }})"
            echo "- **Content audit strict:** ${{ inputs.content_audit_strict }}"
            echo "- **Min SEO score (assert):** ${{ inputs.assert_seo_min_score != '' && inputs.assert_seo_min_score || '_(not enforced)_' }}"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          if [ -f .lighthouseci/manifest.json ]; then
            {
              echo "### Lighthouse (SEO category)"
              echo ""
              echo "| URL | SEO score |"
              echo "|-----|----------|"
              rep_count="$(jq '[.[] | select(.isRepresentativeRun == true)] | length' .lighthouseci/manifest.json)"
              if [ "${rep_count:-0}" -gt 0 ]; then
                jq -r '.[] | select(.isRepresentativeRun == true) | (.summary.seo // null) as $s | "| `\(.url)` | **" + (if $s == null then "—" else ((($s * 100) | floor | tostring) + "%") end) + "** |"' .lighthouseci/manifest.json
              else
                jq -r '.[] | (.summary.seo // null) as $s | "| `\(.url)` | **" + (if $s == null then "—" else ((($s * 100) | floor | tostring) + "%") end) + "** |"' .lighthouseci/manifest.json
              fi
              echo ""
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "### Lighthouse (SEO category)"
              echo ""
              echo "_(No \`.lighthouseci/manifest.json\` — Lighthouse did not finish or did not write output. See the **Run Lighthouse CI** step logs.)_"
              echo ""
            } >> "$GITHUB_STEP_SUMMARY"
          fi
