# ==============================================================================
# Reusable Workflow: SAST & Security Scanning
# ==============================================================================
# Runs static application security testing:
#   - Trivy:     vulnerability scanning for deps, IaC, secrets (MANDATORY - blocks CI)
#   - pip-audit: Python dependency CVE check via OSV database (optional, informational)
#   - Gitleaks:  secret/credential detection in git history   (optional, informational)
#   - Bandit:    Python source code SAST                      (optional, informational)
#   - Gosec:     Go source code SAST                          (optional, informational)
#   - njsscan:   Node/JS source code SAST                     (optional, informational)
#
# Only Trivy failures block auto-approve. All other scanners run with
# continue-on-error: true — findings appear in the UI as warnings but
# do not fail the workflow.
#
# Usage (basic — all repos):
#   jobs:
#     security:
#       uses: NeuralTrust/workflows/.github/workflows/sast.yml@main
#
# Usage (Python project — source in app/):
#   jobs:
#     security:
#       uses: NeuralTrust/workflows/.github/workflows/sast.yml@main
#       with:
#         bandit_enabled: true
#         bandit_path: app           # ← set to your source directory
#         pip_audit_enabled: true
#         gitleaks_enabled: true
#
# Usage (Go project):
#   jobs:
#     security:
#       uses: NeuralTrust/workflows/.github/workflows/sast.yml@main
#       with:
#         gosec_enabled: true
#         gitleaks_enabled: true
#
# Usage (Node project):
#   jobs:
#     security:
#       uses: NeuralTrust/workflows/.github/workflows/sast.yml@main
#       with:
#         njsscan_enabled: true
#         gitleaks_enabled: true
#
# Usage (IaC / full scan):
#   jobs:
#     security:
#       uses: NeuralTrust/workflows/.github/workflows/sast.yml@main
#       with:
#         trivy_scanners: vuln,secret,config   # also scan k8s/terraform/docker
# ==============================================================================

name: SAST & Security

on:
  workflow_call:
    inputs:
      # ======================================================================
      # Trivy (all languages)
      # ======================================================================
      trivy_severity:
        description: 'Trivy severity levels to report (comma-separated)'
        required: false
        type: string
        default: 'CRITICAL,HIGH'
      trivy_exit_code:
        description: 'Exit code when vulnerabilities are found (1=fail, 0=warn)'
        required: false
        type: string
        default: '1'
      scan_type:
        description: 'Trivy scan type (fs, config, repo)'
        required: false
        type: string
        default: 'fs'
      trivy_scanners:
        description: >
          Comma-separated list of Trivy scanners to enable.
          Supported: vuln, secret, config, license.
          Default enables vulnerability and secret scanning.
          Add "config" to also scan IaC files (k8s, Terraform, Dockerfile).
        required: false
        type: string
        default: 'vuln,secret'
      trivy_ignorefile:
        description: >
          Path to a Trivy ignore file (.trivyignore) for suppressing
          false positives. Auto-detected from repo root if present.
        required: false
        type: string
        default: ''

      # ======================================================================
      # pip-audit (Python)
      # ======================================================================
      pip_audit_enabled:
        description: 'Enable pip-audit Python dependency CVE scanning (OSV database)'
        required: false
        type: boolean
        default: false
      pip_audit_path:
        description: >
          Path to requirements file for pip-audit (e.g. requirements.txt).
          Leave empty to let pip-audit auto-detect (works with uv.lock via
          `uv export`, or falls back to scanning the installed environment).
        required: false
        type: string
        default: ''

      # ======================================================================
      # Gitleaks (all languages)
      # ======================================================================
      gitleaks_enabled:
        description: 'Enable gitleaks secret detection across the full git history'
        required: false
        type: boolean
        default: false

      # ======================================================================
      # Gosec (Go)
      # ======================================================================
      gosec_enabled:
        description: 'Enable Gosec Go security scanner'
        required: false
        type: boolean
        default: false
      gosec_args:
        description: 'Gosec arguments (e.g., -exclude-dir=vendor -no-fail ./...)'
        required: false
        type: string
        default: './...'
      gosec_version:
        description: 'Gosec version to install (e.g., 2.21.4)'
        required: false
        type: string
        default: '2.22.8'

      # ======================================================================
      # Bandit (Python)
      # ======================================================================
      bandit_enabled:
        description: 'Enable Bandit Python security scanner'
        required: false
        type: boolean
        default: false
      bandit_path:
        description: >
          Directory to scan with Bandit (relative to repo root).
          Set this to your source directory, e.g. "app", "src", "backend".
          Ignored when bandit_args is non-empty.
        required: false
        type: string
        default: 'src'
      bandit_args:
        description: >
          Full Bandit argument string. When non-empty this overrides the
          auto-constructed command and bandit_path is ignored.
          Use this for advanced cases (e.g. custom config file, extra exclusions).
        required: false
        type: string
        default: ''

      # ======================================================================
      # njsscan (Node/JS)
      # ======================================================================
      njsscan_enabled:
        description: 'Enable njsscan Node.js/JS security scanner'
        required: false
        type: boolean
        default: false
      njsscan_args:
        description: 'njsscan arguments (e.g., --missing-controls)'
        required: false
        type: string
        default: '.'

jobs:
  # ============================================================================
  # Trivy: Vulnerability & Misconfiguration Scanner (all languages)
  # ============================================================================
  trivy:
    name: Vulnerability Scan (Trivy)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    # SARIF is saved as a downloadable workflow artifact (below), not pushed to the
    # GitHub Security tab — that path needs GitHub Advanced Security, which we don't
    # have. Artifact upload uses the default token, so no extra scopes are required.
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Detect Trivy ignore file
        id: trivyignore
        run: |
          if [ -n "${{ inputs.trivy_ignorefile }}" ]; then
            echo "path=${{ inputs.trivy_ignorefile }}" >> "$GITHUB_OUTPUT"
          elif [ -f ".trivyignore" ]; then
            echo "path=.trivyignore" >> "$GITHUB_OUTPUT"
          else
            echo "path=" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Trivy vulnerability scanner
        # SHA-pinned to the only post-incident-safe release (Mar 2026 supply-chain
        # compromise, CVE-2026-33634): tags 0.0.1–0.34.2 were force-pushed to
        # malicious commits. Pin trivy itself to a release whose artifacts still
        # exist — the action's old default (v0.65.0) was deleted and now 404s.
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          version: 'v0.71.0'
          scan-type: ${{ inputs.scan_type }}
          scan-ref: '.'
          scanners: ${{ inputs.trivy_scanners }}
          severity: ${{ inputs.trivy_severity }}
          format: 'table'
          exit-code: ${{ inputs.trivy_exit_code }}
          ignore-unfixed: true
          trivyignores: ${{ steps.trivyignore.outputs.path }}

      - name: Run Trivy SARIF report
        if: always()
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          version: 'v0.71.0'
          scan-type: ${{ inputs.scan_type }}
          scan-ref: '.'
          scanners: ${{ inputs.trivy_scanners }}
          severity: ${{ inputs.trivy_severity }}
          format: 'sarif'
          output: 'trivy-sast.sarif'
          exit-code: '0'
          ignore-unfixed: true
          trivyignores: ${{ steps.trivyignore.outputs.path }}

      - name: Save Trivy SARIF report as artifact
        # No GitHub Advanced Security, so SARIF can't go to the Security tab. Save it
        # as a downloadable artifact instead (no GHAS / extra scopes needed). Short
        # retention keeps storage negligible. Findings are also visible in the table
        # scan log above and the step summary.
        if: always() && hashFiles('trivy-sast.sarif') != ''
        uses: actions/upload-artifact@v7
        with:
          name: trivy-sast-sarif
          path: trivy-sast.sarif
          retention-days: 7

      - name: Summary
        if: always()
        run: |
          {
            echo "## Trivy Vulnerability Scan"
            echo ""
            echo "- **Severity:** ${{ inputs.trivy_severity }}"
            echo "- **Scan type:** ${{ inputs.scan_type }}"
            echo "- **Scanners:** ${{ inputs.trivy_scanners }}"
            echo ""
            echo "Findings are in the scan logs above; the SARIF report is saved as the \`trivy-sast-sarif\` run artifact."
          } >> "$GITHUB_STEP_SUMMARY"

  # ============================================================================
  # pip-audit: Python Dependency CVE Scanner (OSV database)
  # ============================================================================
  pip-audit:
    name: Python Dep Audit (pip-audit)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: inputs.pip_audit_enabled
    continue-on-error: true

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install pip-audit
        run: uv pip install --system --no-config pip-audit

      - name: Run pip-audit
        run: |
          if [ -n "${{ inputs.pip_audit_path }}" ]; then
            echo "Auditing from provided requirements file: ${{ inputs.pip_audit_path }}"
            pip-audit -r "${{ inputs.pip_audit_path }}"
          elif [ -f "uv.lock" ]; then
            echo "uv.lock detected — exporting to requirements format for audit"
            uv export --format requirements-txt --no-hashes --no-dev -o /tmp/audit-requirements.txt
            pip-audit -r /tmp/audit-requirements.txt
          elif [ -f "requirements.txt" ]; then
            echo "Auditing from requirements.txt"
            pip-audit -r requirements.txt
          else
            echo "No requirements file found — auditing installed environment"
            pip-audit
          fi

      - name: Summary
        if: always()
        run: |
          {
            echo "## pip-audit Python Dependency Audit"
            echo ""
            echo "Checked Python dependencies against the OSV vulnerability database."
            if [ -n "${{ inputs.pip_audit_path }}" ]; then
              echo "- **Source:** \`${{ inputs.pip_audit_path }}\`"
            elif [ -f "uv.lock" ]; then
              echo "- **Source:** \`uv.lock\` (exported)"
            else
              echo "- **Source:** \`requirements.txt\` / installed environment"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  # ============================================================================
  # Gitleaks: Secret Detection (all languages)
  # ============================================================================
  gitleaks:
    name: Secret Detection (Gitleaks)
    runs-on: ubuntu-latest
    if: inputs.gitleaks_enabled
    continue-on-error: true
    timeout-minutes: 20

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            zricethezav/gitleaks:v8.28.0 \
            detect \
            --source /repo \
            --verbose \
            --exit-code 1 \
            --log-opts="--all"

      - name: Summary
        if: always()
        run: |
          {
            echo "## Gitleaks Secret Detection"
            echo ""
            echo "Scanned full git history for secrets and credentials."
          } >> "$GITHUB_STEP_SUMMARY"

  # ============================================================================
  # Gosec: Go Source Code SAST
  # ============================================================================
  gosec:
    name: Go SAST (Gosec)
    runs-on: ubuntu-latest
    if: inputs.gosec_enabled
    continue-on-error: true
    timeout-minutes: 20

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Install Gosec
        run: |
          if [ "${{ inputs.gosec_version }}" = "latest" ]; then
            go install github.com/securego/gosec/v2/cmd/gosec@latest
          else
            go install github.com/securego/gosec/v2/cmd/gosec@v${{ inputs.gosec_version }}
          fi

      - name: Run Gosec Security Scanner
        run: gosec ${{ inputs.gosec_args }}

      - name: Summary
        if: always()
        run: |
          {
            echo "## Gosec Go Security Scanner"
            echo ""
            echo "- **Args:** \`${{ inputs.gosec_args }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  # ============================================================================
  # Bandit: Python Source Code SAST
  # ============================================================================
  bandit:
    name: Python SAST (Bandit)
    runs-on: ubuntu-latest
    if: inputs.bandit_enabled
    continue-on-error: true
    timeout-minutes: 20

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install Bandit
        run: uv pip install --system --no-config 'bandit[toml]'

      - name: Run Bandit Security Scanner
        run: |
          if [ -n "${{ inputs.bandit_args }}" ]; then
            # Full override: use caller-supplied args verbatim
            bandit ${{ inputs.bandit_args }}
          elif [ -f "pyproject.toml" ]; then
            bandit -c pyproject.toml -r "${{ inputs.bandit_path }}" \
              --severity-level=medium --confidence-level=medium -f screen
          else
            bandit -r "${{ inputs.bandit_path }}" \
              --severity-level=medium --confidence-level=medium -f screen
          fi

      - name: Summary
        if: always()
        run: |
          {
            echo "## Bandit Python Security Scanner"
            echo ""
            if [ -n "${{ inputs.bandit_args }}" ]; then
              echo "- **Args (override):** \`${{ inputs.bandit_args }}\`"
            else
              echo "- **Path:** \`${{ inputs.bandit_path }}\`"
            fi
            echo ""
            echo "Scanned Python source code for:"
            echo "- SQL injection, command injection"
            echo "- Insecure functions (\`eval\`, \`exec\`, \`pickle\`)"
            echo "- Hardcoded passwords and secrets"
            echo "- Weak cryptography"
          } >> "$GITHUB_STEP_SUMMARY"

  # ============================================================================
  # njsscan: Node/JS Source Code SAST
  # ============================================================================
  njsscan:
    name: Node SAST (njsscan)
    runs-on: ubuntu-latest
    if: inputs.njsscan_enabled
    continue-on-error: true
    timeout-minutes: 20

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run njsscan
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            opensecurity/njsscan:0.4.3 \
            --exit-warning ${{ inputs.njsscan_args != '.' && inputs.njsscan_args || '/src' }}

      - name: Summary
        if: always()
        run: |
          {
            echo "## njsscan Node.js Security Scanner"
            echo ""
            echo "- **Args:** \`${{ inputs.njsscan_args }}\`"
            echo ""
            echo "Scanned JavaScript/Node.js source code for:"
            echo "- XSS, prototype pollution"
            echo "- Insecure regex, eval injection"
            echo "- Command injection, path traversal"
            echo "- Hardcoded secrets"
          } >> "$GITHUB_STEP_SUMMARY"
