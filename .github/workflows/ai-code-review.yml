# Reusable workflow for AI-powered code review using OpenAI
# Reviews PR changes and posts inline comments on specific lines with issues

name: AI Code Review

on:
  workflow_call:
    inputs:
      model:
        description: 'OpenAI model to use'
        required: false
        type: string
        default: 'gpt-4o-mini'
      language:
        description: 'Language for the review comments'
        required: false
        type: string
        default: 'english'
    secrets:
      OPENAI_API_KEY:
        required: true
        description: 'OpenAI API key'
      GH_TOKEN:
        required: true
        description: 'GitHub token for creating review comments'

jobs:
  ai-review:
    name: AI Code Review
    runs-on: ubuntu-latest
    
    if: github.event_name == 'pull_request'
    
    permissions:
      contents: read
      pull-requests: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Get PR diff and files
        id: diff
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          # Get changed files with patch info (needed for line comments)
          gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files --paginate > files.json
          
          FILE_COUNT=$(jq length files.json)
          echo "file_count=$FILE_COUNT" >> $GITHUB_OUTPUT
          
          # Get the diff — gh pr diff returns HTTP 406 when diff exceeds
          # GitHub's 20,000-line limit, so fall back to per-file patches.
          if gh pr diff ${{ github.event.pull_request.number }} > pr_diff.txt 2>/dev/null; then
            echo "diff_source=full" >> $GITHUB_OUTPUT
          else
            echo "::notice::PR diff too large for GitHub API; assembling from per-file patches"
            echo "diff_source=patches" >> $GITHUB_OUTPUT
            # Build a diff from the per-file patches (already paginated above)
            jq -r '.[] | select(.patch != null) | "diff --git a/\(.filename) b/\(.filename)\n--- a/\(.filename)\n+++ b/\(.filename)\n\(.patch)"' files.json > pr_diff.txt
          fi
          
          # Truncate diff if too large (max ~80KB to fit in context with response)
          if [ $(wc -c < pr_diff.txt) -gt 80000 ]; then
            head -c 80000 pr_diff.txt > pr_diff_truncated.txt
            mv pr_diff_truncated.txt pr_diff.txt
            echo "truncated=true" >> $GITHUB_OUTPUT
          fi

      - name: Get PR info
        id: pr-info
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }} > pr.json
          PR_TITLE=$(jq -r '.title' pr.json)
          PR_BODY=$(jq -r '.body // ""' pr.json | head -c 500)
          HEAD_SHA=$(jq -r '.head.sha' pr.json)
          echo "title=$PR_TITLE" >> $GITHUB_OUTPUT
          echo "head_sha=$HEAD_SHA" >> $GITHUB_OUTPUT

      - name: AI Review with line-specific comments
        id: review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          DIFF_CONTENT=$(cat pr_diff.txt)
          
          # Create the prompt asking for structured JSON output
          cat > request.json << EOF
          {
            "model": "${{ inputs.model }}",
            "response_format": { "type": "json_object" },
            "messages": [
              {
                "role": "system",
                "content": "You are an expert code reviewer. Analyze the pull request diff and identify issues. Ignore .env.example files and clearly dummy secrets and variables examples in tests and other files. Return a JSON object with this structure:\n\n{\n  \"summary\": \"Brief overall assessment (1-2 sentences)\",\n  \"issues\": [\n    {\n      \"file\": \"path/to/file.go\",\n      \"line\": 42,\n      \"severity\": \"error|warning|suggestion\",\n      \"message\": \"Description of the issue and how to fix it\"\n    }\n  ],\n  \"approved\": true/false\n}\n\nRules:\n- Only report actual issues (bugs, security, performance, bad practices)\n- 'line' must be a line number that appears in the diff (lines starting with +)\n- severity: 'error' for bugs/security, 'warning' for potential issues, 'suggestion' for improvements\n- If no issues found, return empty issues array and approved: true\n- Be concise in messages\n- Language: ${{ inputs.language }}"
              },
              {
                "role": "user",
                "content": $(echo "$DIFF_CONTENT" | jq -Rs .)
              }
            ],
            "max_tokens": 4000,
            "temperature": 0.2
          }
          EOF
          
          # Call OpenAI API
          RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -d @request.json)
          
          # Check for errors - skip review silently on API errors
          if echo "$RESPONSE" | jq -e '.error' > /dev/null 2>&1; then
            ERROR=$(echo "$RESPONSE" | jq -r '.error.message')
            echo "❌ OpenAI API Error: $ERROR"
            echo '{"summary": "", "issues": [], "approved": true, "skip": true}' > review.json
            exit 0
          fi
          
          # Extract the review JSON
          echo "$RESPONSE" | jq -r '.choices[0].message.content' > review.json
          
          # Validate JSON - skip silently on parse errors
          if ! jq empty review.json 2>/dev/null; then
            echo "Invalid JSON response, skipping review"
            echo '{"summary": "", "issues": [], "approved": true, "skip": true}' > review.json
          fi
          
          echo "Review generated:"
          cat review.json

      - name: Post review with inline comments
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          REVIEW=$(cat review.json)
          SUMMARY=$(echo "$REVIEW" | jq -r '.summary')
          APPROVED=$(echo "$REVIEW" | jq -r '.approved')
          ISSUE_COUNT=$(echo "$REVIEW" | jq '.issues | length')
          CRITICAL_COUNT=$(echo "$REVIEW" | jq '[.issues[] | select(.severity == "error")] | length')
          SKIP=$(echo "$REVIEW" | jq -r '.skip // false')
          
          echo "Summary: $SUMMARY"
          echo "Total issues found: $ISSUE_COUNT"
          echo "Critical issues found: $CRITICAL_COUNT"
          echo "Approved: $APPROVED"
          
          # Skip posting if there was an API error
          if [ "$SKIP" = "true" ]; then
            echo "⚠️ Skipping review comment due to API error"
            exit 0
          fi
          
          # Only post PR comments for critical (error) issues.
          # Warnings and suggestions are logged in the workflow summary only.
          if [ "$CRITICAL_COUNT" -eq 0 ]; then
            echo "✅ No critical issues — skipping PR comment (warnings/suggestions visible in workflow summary)"
            exit 0
          fi
          
          # Build review comments array with critical issues only
          COMMENTS="[]"
          
          for i in $(seq 0 $((ISSUE_COUNT - 1))); do
            SEVERITY=$(echo "$REVIEW" | jq -r ".issues[$i].severity")
            
            # Only include critical (error) issues as inline comments
            if [ "$SEVERITY" != "error" ]; then
              continue
            fi
            
            FILE=$(echo "$REVIEW" | jq -r ".issues[$i].file")
            LINE=$(echo "$REVIEW" | jq -r ".issues[$i].line")
            MESSAGE=$(echo "$REVIEW" | jq -r ".issues[$i].message")
            
            BODY="🚨 error: $MESSAGE"
            
            COMMENTS=$(echo "$COMMENTS" | jq \
              --arg path "$FILE" \
              --arg line "$LINE" \
              --arg body "$BODY" \
              '. + [{"path": $path, "line": ($line | tonumber), "body": $body}]')
          done
          
          EVENT="REQUEST_CHANGES"
          BODY="🤖 AI Review: $SUMMARY — Found $CRITICAL_COUNT critical issue(s), see inline comments."
          
          # Create the review with inline comments
          REVIEW_BODY=$(printf '%s' "$BODY" | jq -Rs .)
          
          cat > review_request.json << EOF
          {
            "commit_id": "${{ steps.pr-info.outputs.head_sha }}",
            "body": $REVIEW_BODY,
            "event": "$EVENT",
            "comments": $COMMENTS
          }
          EOF
          
          echo "Creating review with event: $EVENT"
          cat review_request.json
          
          # Post the review
          RESULT=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews \
            --method POST \
            --input review_request.json 2>&1) || true
          
          # If inline comments fail (wrong line numbers), fall back to general comment
          if echo "$RESULT" | grep -q "error"; then
            echo "⚠️ Inline comments failed, posting general comment"
            
            # Build a comment with critical issues only
            ISSUES_TEXT="\n\nCritical issues:\n"
            for i in $(seq 0 $((ISSUE_COUNT - 1))); do
              SEVERITY=$(echo "$REVIEW" | jq -r ".issues[$i].severity")
              if [ "$SEVERITY" != "error" ]; then
                continue
              fi
              
              FILE=$(echo "$REVIEW" | jq -r ".issues[$i].file")
              LINE=$(echo "$REVIEW" | jq -r ".issues[$i].line")
              MESSAGE=$(echo "$REVIEW" | jq -r ".issues[$i].message")
              
              ISSUES_TEXT="$ISSUES_TEXT\n- 🚨 $FILE:$LINE — $MESSAGE"
            done
            
            COMMENT="🤖 AI Review: $SUMMARY$ISSUES_TEXT"
            
            gh pr comment ${{ github.event.pull_request.number }} --body "$(printf '%b' "$COMMENT")"
          else
            echo "✅ Review posted successfully"
          fi

      - name: Summary
        run: |
          REVIEW=$(cat review.json)
          ISSUE_COUNT=$(echo "$REVIEW" | jq '.issues | length')
          CRITICAL_COUNT=$(echo "$REVIEW" | jq '[.issues[] | select(.severity == "error")] | length')
          WARNING_COUNT=$(echo "$REVIEW" | jq '[.issues[] | select(.severity == "warning")] | length')
          SUGGESTION_COUNT=$(echo "$REVIEW" | jq '[.issues[] | select(.severity == "suggestion")] | length')
          APPROVED=$(echo "$REVIEW" | jq -r '.approved')
          
          echo "## 🤖 AI Code Review Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **PR**: #${{ github.event.pull_request.number }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Files reviewed**: ${{ steps.diff.outputs.file_count }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Issues found**: $ISSUE_COUNT (🚨 $CRITICAL_COUNT critical, ⚠️ $WARNING_COUNT warnings, 💡 $SUGGESTION_COUNT suggestions)" >> $GITHUB_STEP_SUMMARY
          echo "- **PR commented**: $([ "$CRITICAL_COUNT" -gt 0 ] && echo 'Yes (critical issues)' || echo 'No')" >> $GITHUB_STEP_SUMMARY
          echo "- **Model**: ${{ inputs.model }}" >> $GITHUB_STEP_SUMMARY
          
          if [ "$APPROVED" = "true" ]; then
            echo "- **Result**: ✅ Approved" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Result**: ⚠️ Changes requested" >> $GITHUB_STEP_SUMMARY
          fi
          
          # List all issues in the summary so warnings/suggestions are still visible
          if [ "$ISSUE_COUNT" -gt 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Issues" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            for i in $(seq 0 $((ISSUE_COUNT - 1))); do
              FILE=$(echo "$REVIEW" | jq -r ".issues[$i].file")
              LINE=$(echo "$REVIEW" | jq -r ".issues[$i].line")
              SEVERITY=$(echo "$REVIEW" | jq -r ".issues[$i].severity")
              MESSAGE=$(echo "$REVIEW" | jq -r ".issues[$i].message")
              case "$SEVERITY" in
                error) EMOJI="🚨" ;;
                warning) EMOJI="⚠️" ;;
                suggestion) EMOJI="💡" ;;
                *) EMOJI="📝" ;;
              esac
              echo "- $EMOJI **$SEVERITY** — \`$FILE:$LINE\` — $MESSAGE" >> $GITHUB_STEP_SUMMARY
            done
          fi

      - name: Fail if critical issues found
        run: |
          REVIEW=$(cat review.json)
          ERROR_COUNT=$(echo "$REVIEW" | jq '[.issues[] | select(.severity == "error")] | length')
          
          if [ "$ERROR_COUNT" -gt 0 ]; then
            echo "❌ Found $ERROR_COUNT critical issue(s). Blocking auto-approve."
            exit 1
          fi
          
          echo "✅ No critical issues found."
