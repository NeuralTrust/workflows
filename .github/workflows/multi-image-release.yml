# ==============================================================================
# Reusable Workflow: Multi-Image Release Build & Deploy
# ==============================================================================
# Triggered when a GitHub Release is published. Builds multiple Docker images
# in parallel using a matrix, tags them with the release version, and updates
# the prod kustomization.yaml with the release tag.
#
# Usage:
#   jobs:
#     release:
#       uses: NeuralTrust/workflows/.github/workflows/multi-image-release.yml@main
#       with:
#         images: '[{"name":"api","target":"api"},{"name":"worker","target":"worker"}]'
#         kustomize_images: '[{"kustomize_name":"api","image_name":"api"}]'
#         gcp_project_id: ${{ vars.GCP_PROJECT_ID }}
#       secrets: inherit
# ==============================================================================

name: Multi-Image Release Build & Deploy

on:
  workflow_call:
    inputs:
      images:
        description: 'JSON array of image build configs (same schema as multi-image-deploy.yml)'
        required: true
        type: string
      kustomize_images:
        description: 'JSON array for kustomization: [{"kustomize_name":"X","image_name":"Y"}]'
        required: true
        type: string
      gcp_project_id:
        description: 'GCP Project ID that owns the Artifact Registry'
        required: true
        type: string
      registry:
        description: 'Artifact Registry host'
        required: false
        type: string
        default: 'europe-west1-docker.pkg.dev'
      repository:
        description: 'Artifact Registry repository name'
        required: false
        type: string
        default: 'nt-docker'
      overlay_path:
        description: 'Path to kustomize overlay to update'
        required: false
        type: string
        default: 'k8s/overlays/prod'
      commit_message_prefix:
        description: 'Prefix for the kustomization commit message'
        required: false
        type: string
        default: ''
      free_disk_space:
        description: 'Free disk space before build (needed for large images like pytorch/cuda)'
        required: false
        type: boolean
        default: false
      runner:
        description: 'GitHub Actions runner label'
        required: false
        type: string
        default: 'ubuntu-latest'
    secrets:
      WIF_PROVIDER:
        required: true
      WIF_SERVICE_ACCOUNT:
        required: true
      BUILD_SECRETS:
        required: false
      GH_TOKEN:
        required: true
      SLACK_WEBHOOK_URL:
        required: false
        description: 'Slack Incoming Webhook URL for release notifications'
      DOCKER_SECRETS:
        required: false
        description: 'Newline-separated Docker build secrets (e.g. for mount-type secrets in Dockerfile)'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ============================================================================
  # Job 1: Build all images in parallel (matrix) with release tags
  # ============================================================================
  build:
    name: Build ${{ matrix.image.name }} (${{ github.ref_name }})
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 60

    strategy:
      matrix:
        image: ${{ fromJson(inputs.images) }}
      fail-fast: false

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Free disk space
        if: inputs.free_disk_space
        uses: NeuralTrust/workflows/.github/actions/free-disk-space@main

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Build and push Docker image
        uses: NeuralTrust/workflows/.github/actions/docker-build-push@main
        with:
          image_name: ${{ matrix.image.name }}
          gcp_project_id: ${{ inputs.gcp_project_id }}
          registry: ${{ inputs.registry }}
          repository: ${{ inputs.repository }}
          context: ${{ matrix.image.context || '.' }}
          dockerfile: ${{ matrix.image.dockerfile || 'Dockerfile' }}
          build_target: ${{ matrix.image.target || '' }}
          build_args: ${{ matrix.image.build_args }}
          build_secrets: ${{ secrets.BUILD_SECRETS }}
          docker_secrets: ${{ secrets.DOCKER_SECRETS }}
          access_token: ${{ steps.auth.outputs.access_token }}
          app_version: ${{ github.ref_name }}
          primary_tag: ${{ github.ref_name }}
          tag_prefix: ${{ matrix.image.tag_prefix }}
          tag_suffix: ${{ matrix.image.tag_suffix }}
          extra_tags: ${{ github.sha }}

  # ============================================================================
  # Job 2: Update Kustomization with Release Tag
  # ============================================================================
  update-kustomization:
    name: Update Kustomization (${{ github.ref_name }})
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_TOKEN }}
          ref: main
          fetch-depth: 0

      - name: Update kustomization.yaml
        uses: NeuralTrust/workflows/.github/actions/kustomize-set-images@main
        with:
          overlay_dir: ${{ inputs.overlay_path }}
          images: ${{ inputs.kustomize_images }}
          image_tag: ${{ github.ref_name }}
          registry: ${{ inputs.registry }}
          gcp_project_id: ${{ inputs.gcp_project_id }}
          repository: ${{ inputs.repository }}

      - name: Update APPLICATION_VERSION in config.env
        run: |
          OVERLAY_DIR="${{ inputs.overlay_path }}"
          CONFIG_FILE="${OVERLAY_DIR}/config.env"
          RELEASE_TAG="${{ github.ref_name }}"

          if [ ! -f "$CONFIG_FILE" ]; then
            echo "::warning::${CONFIG_FILE} not found. Skipping APPLICATION_VERSION update."
            exit 0
          fi

          # Ensure file ends with a newline before modifying
          [ -s "$CONFIG_FILE" ] && [ "$(tail -c1 "$CONFIG_FILE")" != "" ] && echo "" >> "$CONFIG_FILE"

          if grep -q '^APPLICATION_VERSION=' "$CONFIG_FILE"; then
            sed -i "s|^APPLICATION_VERSION=.*|APPLICATION_VERSION=${RELEASE_TAG}|" "$CONFIG_FILE"
          else
            echo "APPLICATION_VERSION=${RELEASE_TAG}" >> "$CONFIG_FILE"
          fi

      - name: Compute commit message
        id: commit-message
        env:
          PREFIX: ${{ inputs.commit_message_prefix }}
          RELEASE_TAG: ${{ github.ref_name }}
          OVERLAY_DIR: ${{ inputs.overlay_path }}
        run: |
          if [ -n "$PREFIX" ]; then
            echo "message=release ${PREFIX} ${RELEASE_TAG} in ${OVERLAY_DIR}" >> "$GITHUB_OUTPUT"
          else
            echo "message=release ${RELEASE_TAG} in ${OVERLAY_DIR}" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push changes
        uses: NeuralTrust/workflows/.github/actions/git-commit-push@main
        with:
          branch: main
          message: ${{ steps.commit-message.outputs.message }}
          paths: |
            ${{ inputs.overlay_path }}/kustomization.yaml
            ${{ inputs.overlay_path }}/config.env

      - name: Release deployment summary
        run: |
          OVERLAY_DIR="${{ inputs.overlay_path }}"
          RELEASE_TAG="${{ github.ref_name }}"

          {
            echo "## Release Deployed"
            echo "- **Release:** \`${RELEASE_TAG}\`"
            echo "- **Overlay:** \`${OVERLAY_DIR}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  # ============================================================================
  # Job 3: Slack Notification
  # ============================================================================
  notify:
    name: Slack Notification
    needs: [build, update-kustomization]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Send Slack notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "No Slack webhook configured, skipping"
            exit 0
          fi

          BUILD="${{ needs.build.result }}"
          KUSTOMIZE="${{ needs.update-kustomization.result }}"

          if [ "$BUILD" = "success" ] && { [ "$KUSTOMIZE" = "success" ] || [ "$KUSTOMIZE" = "skipped" ]; }; then
            COLOR="#36a64f"
            STATUS="Released"
            EMOJI=":white_check_mark:"
          else
            COLOR="#dc3545"
            STATUS="Failed"
            EMOJI=":x:"
          fi

          PREFIX="${{ inputs.commit_message_prefix }}"
          IMAGES_LABEL="${PREFIX:-multi-image}"

          curl -sf "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "$(jq -n \
              --arg color "$COLOR" \
              --arg status "$STATUS" \
              --arg emoji "$EMOJI" \
              --arg repo "${{ github.repository }}" \
              --arg images "$IMAGES_LABEL" \
              --arg tag "${{ github.ref_name }}" \
              --arg url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              --arg actor "${{ github.actor }}" \
              '{
                "attachments": [{
                  "color": $color,
                  "blocks": [
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": ($emoji + " *" + $status + "* | `" + $repo + "`")
                      }
                    },
                    {
                      "type": "section",
                      "fields": [
                        {"type": "mrkdwn", "text": ("*Images:*\n`" + $images + "`")},
                        {"type": "mrkdwn", "text": ("*Release:*\n`" + $tag + "`")},
                        {"type": "mrkdwn", "text": ("*Actor:*\n" + $actor)},
                        {"type": "mrkdwn", "text": ("*Workflow:*\n<" + $url + "|View Run>")}
                      ]
                    }
                  ]
                }]
              }'
            )" || echo "::warning::Slack notification failed"
