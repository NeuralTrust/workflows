# ==============================================================================
# Reusable Workflow: Smart Release (promote or rebuild)
# ==============================================================================
# Automatically detects the best release strategy:
#
#   develop → main PR  →  PROMOTE: copies the tested dev image to prod
#                          (zero build time, byte-identical binary)
#
#   hotfix / direct push →  REBUILD: full Docker build in the prod registry
#                            (same as release-deploy.yml)
#
# Detection logic:
#   1. Checks if the release commit is associated with a merged PR from
#      develop (or dev) to main via the GitHub API.
#   2. If yes, verifies the dev image exists in the dev registry.
#   3. If both pass → promote. Otherwise → rebuild.
#
# Version injection:
#   The workflow updates config.env in the prod overlay with
#   APPLICATION_VERSION=<release_tag>. The ConfigMap propagates it to pods.
#   Go services use init() env var override; Python/Node already read from env.
#
# Usage:
#   jobs:
#     release:
#       uses: NeuralTrust/workflows/.github/workflows/release-promote.yml@main
#       with:
#         image_name: my-service
#         gcp_project_id: prod-project-id
#         dev_gcp_project_id: dev-project-id
#       secrets: inherit
# ==============================================================================

name: Smart Release

on:
  workflow_call:
    inputs:
      image_name:
        description: 'Docker image name in the registry'
        required: true
        type: string
      gcp_project_id:
        description: 'Prod GCP Project ID (destination)'
        required: true
        type: string
      dev_gcp_project_id:
        description: 'Dev GCP Project ID (source for promote)'
        required: true
        type: string
      registry:
        description: 'Artifact Registry host (shared between dev and prod)'
        required: false
        type: string
        default: 'europe-west1-docker.pkg.dev'
      repository:
        description: 'Artifact Registry repository name'
        required: false
        type: string
        default: 'nt-docker'
      # ---- Build inputs (used only for rebuild strategy) ----
      dockerfile:
        description: 'Path to Dockerfile relative to context'
        required: false
        type: string
        default: 'Dockerfile'
      context:
        description: 'Docker build context path'
        required: false
        type: string
        default: '.'
      build_target:
        description: 'Docker build target for multi-stage builds'
        required: false
        type: string
        default: ''
      build_args:
        description: 'Newline-separated non-secret build args (KEY=VALUE)'
        required: false
        type: string
        default: ''
      # ---- Tag inputs ----
      tag_prefix:
        description: 'Prefix for image tags (e.g., "gpu-")'
        required: false
        type: string
        default: ''
      tag_suffix:
        description: 'Suffix for image tags (e.g., "-with-models")'
        required: false
        type: string
        default: ''
      # ---- Kustomization inputs ----
      kustomize_name:
        description: 'Image name in kustomization.yaml (defaults to image_name)'
        required: false
        type: string
        default: ''
      overlay_path:
        description: 'Path to prod kustomize overlay'
        required: false
        type: string
        default: 'k8s/overlays/prod'
      config_env_file:
        description: 'Name of the config env file in the overlay'
        required: false
        type: string
        default: 'config.env'
      free_disk_space:
        description: 'Free disk space before build (needed for large images like pytorch/cuda)'
        required: false
        type: boolean
        default: false
      runner:
        description: 'GitHub Actions runner label'
        required: false
        type: string
        default: 'ubuntu-latest'
      # ---- Source branch name ----
      dev_branch:
        description: 'Name of the development branch (for PR detection)'
        required: false
        type: string
        default: 'develop'
    secrets:
      WIF_PROVIDER:
        required: true
        description: 'GCP Workload Identity Federation provider'
      WIF_SERVICE_ACCOUNT:
        required: true
        description: 'GCP service account email for WIF'
      BUILD_SECRETS:
        required: false
        description: 'Newline-separated secret build args (used only for rebuild)'
      GH_TOKEN:
        required: true
        description: 'GitHub token with push permissions for kustomization updates'
      SLACK_WEBHOOK_URL:
        required: false
        description: 'Slack Incoming Webhook URL for release notifications'
      DOCKER_SECRETS:
        required: false
        description: 'Newline-separated Docker build secrets (e.g. for mount-type secrets in Dockerfile)'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ============================================================================
  # Job 1: Release — detect strategy, then promote or rebuild
  # ============================================================================
  release:
    name: Release ${{ inputs.image_name }} (${{ github.ref_name }})
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 60

    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      image_ref: ${{ steps.meta.outputs.prod_image_ref }}
      strategy: ${{ steps.strategy.outputs.final }}
      source_ref: ${{ steps.strategy.outputs.source_ref }}
      scan_target: ${{ steps.scan_target.outputs.ref }}

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Free disk space
        if: inputs.free_disk_space
        uses: NeuralTrust/workflows/.github/actions/free-disk-space@main

      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # ----------------------------------------------------------------
      # Step 1: Detect release strategy
      # ----------------------------------------------------------------
      - name: Detect release strategy
        id: detect
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "::group::Detecting release strategy"
          echo "Release commit: ${{ github.sha }}"
          echo "Release tag: ${{ github.ref_name }}"

          # Check if this commit came from a develop→main PR
          PR_DATA=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }}/pulls 2>/dev/null || echo '[]')

          # Use 'objects' filter to skip any non-object entries in the API response
          DEV_PR=$(echo "$PR_DATA" | jq -r '
            [.[] | objects | select(
              .base.ref == "main" and
              (.head.ref == "${{ inputs.dev_branch }}" or .head.ref == "dev") and
              .merged_at != null
            )] | first // empty' 2>/dev/null || echo '')

          if [ -n "$DEV_PR" ] && [ "$DEV_PR" != "null" ]; then
            PR_NUM=$(echo "$DEV_PR" | jq -r '.number')
            DEV_SHA=$(echo "$DEV_PR" | jq -r '.head.sha')
            echo "Found merged PR #${PR_NUM} from ${{ inputs.dev_branch }} → main"
            echo "Develop tip SHA: ${DEV_SHA}"
            echo "initial=promote" >> "$GITHUB_OUTPUT"
            echo "dev_sha=${DEV_SHA}" >> "$GITHUB_OUTPUT"
            echo "pr_number=${PR_NUM}" >> "$GITHUB_OUTPUT"
          else
            # Fallback: check merge commit parents, but ONLY promote if the
            # second parent actually belongs to the dev branch.
            PARENT_COUNT=$(git cat-file -p ${{ github.sha }} | grep -c '^parent ' || true)
            if [ "$PARENT_COUNT" -gt 1 ]; then
              DEV_SHA=$(git rev-parse ${{ github.sha }}^2)
              echo "Merge commit detected, second parent: ${DEV_SHA}"
              # Verify the second parent is on the dev branch
              if git branch -r --contains "$DEV_SHA" 2>/dev/null | grep -qE "origin/(${{ inputs.dev_branch }}|dev)$"; then
                echo "Second parent belongs to ${{ inputs.dev_branch }} branch"
                echo "initial=promote" >> "$GITHUB_OUTPUT"
                echo "dev_sha=${DEV_SHA}" >> "$GITHUB_OUTPUT"
              else
                BRANCH_INFO=$(git branch -r --contains "$DEV_SHA" 2>/dev/null | head -5 || echo "unknown")
                echo "Second parent is NOT on ${{ inputs.dev_branch }} — branches: ${BRANCH_INFO}"
                echo "Treating as rebuild (feature branch or hotfix merge)"
                echo "initial=rebuild" >> "$GITHUB_OUTPUT"
              fi
            else
              echo "No develop→main PR found — hotfix or direct push"
              echo "initial=rebuild" >> "$GITHUB_OUTPUT"
            fi
          fi
          echo "::endgroup::"

      # ----------------------------------------------------------------
      # Step 2: Compute image metadata
      # ----------------------------------------------------------------
      - name: Compute image metadata
        id: meta
        run: |
          P="${{ inputs.tag_prefix }}"
          S="${{ inputs.tag_suffix }}"
          RELEASE_TAG="${P}${{ github.ref_name }}${S}"

          PROD_BASE="${{ inputs.registry }}/${{ inputs.gcp_project_id }}/${{ inputs.repository }}/${{ inputs.image_name }}"
          DEV_BASE="${{ inputs.registry }}/${{ inputs.dev_gcp_project_id }}/${{ inputs.repository }}/${{ inputs.image_name }}"

          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "prod_image_base=${PROD_BASE}" >> "$GITHUB_OUTPUT"
          echo "prod_image_ref=${PROD_BASE}:${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "prod_cache_ref=${PROD_BASE}:${P}cache${S}" >> "$GITHUB_OUTPUT"
          echo "prod_latest_ref=${PROD_BASE}:${P}latest${S}" >> "$GITHUB_OUTPUT"
          echo "dev_image_base=${DEV_BASE}" >> "$GITHUB_OUTPUT"

          # Tags for prod registry
          TAGS="${PROD_BASE}:${RELEASE_TAG}"
          TAGS="${TAGS},${PROD_BASE}:${P}${{ github.sha }}${S}"
          TAGS="${TAGS},${PROD_BASE}:${P}latest${S}"
          TAGS="${TAGS},${PROD_BASE}:${P}cache${S}"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      # ----------------------------------------------------------------
      # Step 3: Authenticate
      # ----------------------------------------------------------------
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Install crane
        uses: NeuralTrust/workflows/.github/actions/setup-crane@main

      - name: Login to Artifact Registry (crane)
        env:
          ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
        run: |
          echo "$ACCESS_TOKEN" | \
            crane auth login ${{ inputs.registry }} -u oauth2accesstoken --password-stdin

      # ----------------------------------------------------------------
      # Step 4: Resolve final strategy (verify dev image exists for promote)
      # ----------------------------------------------------------------
      - name: Resolve final strategy
        id: strategy
        run: |
          INITIAL="${{ steps.detect.outputs.initial }}"

          if [ "$INITIAL" = "promote" ]; then
            DEV_SHA="${{ steps.detect.outputs.dev_sha }}"
            P="${{ inputs.tag_prefix }}"
            S="${{ inputs.tag_suffix }}"
            DEV_BASE="${{ steps.meta.outputs.dev_image_base }}"

            SHA_REF="${DEV_BASE}:${P}${DEV_SHA}${S}"
            LATEST_REF="${DEV_BASE}:${P}latest${S}"

            echo "Checking dev image by SHA: ${SHA_REF}"

            if crane manifest "${SHA_REF}" > /dev/null 2>&1; then
              echo "Dev image found by commit SHA"
              echo "final=promote" >> "$GITHUB_OUTPUT"
              echo "source_ref=${SHA_REF}" >> "$GITHUB_OUTPUT"
            elif crane manifest "${LATEST_REF}" > /dev/null 2>&1; then
              echo "::notice::Dev image not found by SHA (overlay may be ahead of that commit) — using latest tag from dev registry"
              echo "final=promote" >> "$GITHUB_OUTPUT"
              echo "source_ref=${LATEST_REF}" >> "$GITHUB_OUTPUT"
            else
              echo "::warning::Dev image not found by SHA or latest tag — falling back to rebuild"
              echo "final=rebuild" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "Strategy: rebuild (hotfix / direct push)"
            echo "final=rebuild" >> "$GITHUB_OUTPUT"
          fi

          echo "## Release Strategy" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Strategy:** \`$( [ "$INITIAL" = "promote" ] && echo "${{ steps.detect.outputs.initial }}" || echo "rebuild")\` → \`$(cat "$GITHUB_OUTPUT" | grep '^final=' | cut -d= -f2)\`" >> "$GITHUB_STEP_SUMMARY"

      # ================================================================
      # PROMOTE PATH — crane copy is deferred to the promote-copy job,
      # which runs AFTER the image-scan gate so a vulnerable dev image
      # never gets tagged with the prod release tag.
      # ================================================================

      # ================================================================
      # REBUILD PATH — full Docker build (hotfix / fallback)
      # ================================================================
      - name: Build and push Docker image
        if: steps.strategy.outputs.final == 'rebuild'
        uses: NeuralTrust/workflows/.github/actions/docker-build-push@main
        with:
          image_name: ${{ inputs.image_name }}
          gcp_project_id: ${{ inputs.gcp_project_id }}
          registry: ${{ inputs.registry }}
          repository: ${{ inputs.repository }}
          dockerfile: ${{ inputs.dockerfile }}
          context: ${{ inputs.context }}
          build_target: ${{ inputs.build_target }}
          build_args: ${{ inputs.build_args }}
          build_secrets: ${{ secrets.BUILD_SECRETS }}
          docker_secrets: ${{ secrets.DOCKER_SECRETS }}
          access_token: ${{ steps.auth.outputs.access_token }}
          app_version: ${{ github.ref_name }}
          primary_tag: ${{ github.ref_name }}
          tag_prefix: ${{ inputs.tag_prefix }}
          tag_suffix: ${{ inputs.tag_suffix }}
          extra_tags: ${{ github.sha }}

      - name: Rebuild summary
        if: steps.strategy.outputs.final == 'rebuild'
        run: |
          echo "## Image Built (Rebuild)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Image:** \`${{ steps.meta.outputs.prod_image_ref }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Reason:** Hotfix or direct push (no dev image to promote)" >> "$GITHUB_STEP_SUMMARY"

      # ----------------------------------------------------------------
      # Resolve scan target — for promote this is the dev source image
      # (we scan it BEFORE copying to prod tags); for rebuild this is
      # the prod image we just pushed.
      # ----------------------------------------------------------------
      - name: Resolve scan target
        id: scan_target
        run: |
          if [ "${{ steps.strategy.outputs.final }}" = "promote" ]; then
            REF="${{ steps.strategy.outputs.source_ref }}"
          else
            REF="${{ steps.meta.outputs.prod_image_ref }}"
          fi
          echo "ref=${REF}" >> "$GITHUB_OUTPUT"
          echo "Scan target: ${REF}"

  # ============================================================================
  # Job 2: Image Vulnerability Scan (BLOCK on CRITICAL/HIGH fixable CVEs)
  # ============================================================================
  # Scans the image about to be promoted/released. For promote this is the dev
  # source image (scanned BEFORE crane copy in promote-copy). For rebuild this
  # is the freshly built prod image. A failure here fails the release.
  scan:
    name: Image Vulnerability Scan
    needs: release
    uses: ./.github/workflows/image-scan.yml
    permissions:
      contents: read
      id-token: write
    with:
      image_ref: ${{ needs.release.outputs.scan_target }}
      exit_code: '1'
      upload_sarif: false
    secrets:
      WIF_PROVIDER: ${{ secrets.WIF_PROVIDER }}
      WIF_SERVICE_ACCOUNT: ${{ secrets.WIF_SERVICE_ACCOUNT }}

  # ============================================================================
  # Job 3: Promote copy — crane copy dev → prod (promote strategy only)
  # ============================================================================
  # Only runs after the scan gate has passed, so a dirty dev image can never
  # acquire a prod release tag.
  promote-copy:
    name: Promote Image (dev → prod)
    needs: [release, scan]
    if: needs.release.outputs.strategy == 'promote'
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 20

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Install crane
        uses: NeuralTrust/workflows/.github/actions/setup-crane@main

      - name: Login to Artifact Registry (crane)
        env:
          ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
        run: |
          echo "$ACCESS_TOKEN" | \
            crane auth login ${{ inputs.registry }} -u oauth2accesstoken --password-stdin

      - name: Promote image (dev → prod)
        run: |
          SOURCE="${{ needs.release.outputs.source_ref }}"
          PROD_BASE="${{ inputs.registry }}/${{ inputs.gcp_project_id }}/${{ inputs.repository }}/${{ inputs.image_name }}"
          P="${{ inputs.tag_prefix }}"
          S="${{ inputs.tag_suffix }}"
          SHA="${{ github.sha }}"
          RELEASE_TAG="${{ needs.release.outputs.release_tag }}"

          echo "============================================"
          echo "  PROMOTE: dev → prod (post-scan)"
          echo "============================================"
          echo "  Source:  ${SOURCE}"
          echo "  Dest:    ${PROD_BASE}:${RELEASE_TAG}"
          echo "============================================"

          crane copy "${SOURCE}" "${PROD_BASE}:${RELEASE_TAG}"
          crane copy "${SOURCE}" "${PROD_BASE}:${P}${SHA}${S}"
          crane copy "${SOURCE}" "${PROD_BASE}:${P}latest${S}"
          crane copy "${SOURCE}" "${PROD_BASE}:${P}cache${S}"

          echo "## Image Promoted" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Source:** \`${SOURCE}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Destination:** \`${PROD_BASE}:${RELEASE_TAG}\`" >> "$GITHUB_STEP_SUMMARY"

  # ============================================================================
  # Job 4: Update Kustomization + config.env (gated on scan + promote-copy)
  # ============================================================================
  update-kustomization:
    name: Update Kustomization
    needs: [release, scan, promote-copy]
    if: |
      always() &&
      needs.release.result == 'success' &&
      needs.scan.result == 'success' &&
      (needs.promote-copy.result == 'success' || needs.promote-copy.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GH_TOKEN }}
          ref: main
          fetch-depth: 0

      - name: Update kustomization.yaml
        uses: NeuralTrust/workflows/.github/actions/kustomize-set-images@main
        with:
          overlay_dir: ${{ inputs.overlay_path }}
          images: |
            [{"kustomize_name":"${{ inputs.kustomize_name || inputs.image_name }}","image_name":"${{ inputs.image_name }}"}]
          image_tag: ${{ needs.release.outputs.release_tag }}
          registry: ${{ inputs.registry }}
          gcp_project_id: ${{ inputs.gcp_project_id }}
          repository: ${{ inputs.repository }}

      - name: Update APPLICATION_VERSION in config.env
        run: |
          OVERLAY_DIR="${{ inputs.overlay_path }}"
          CONFIG_FILE="${OVERLAY_DIR}/${{ inputs.config_env_file }}"
          RELEASE_TAG="${{ needs.release.outputs.release_tag }}"

          if [ ! -f "$CONFIG_FILE" ]; then
            echo "::warning::${CONFIG_FILE} not found. Skipping APPLICATION_VERSION update."
            exit 0
          fi

          # Ensure file ends with a newline before modifying
          [ -s "$CONFIG_FILE" ] && [ "$(tail -c1 "$CONFIG_FILE")" != "" ] && echo "" >> "$CONFIG_FILE"

          if grep -q '^APPLICATION_VERSION=' "$CONFIG_FILE"; then
            sed -i "s|^APPLICATION_VERSION=.*|APPLICATION_VERSION=${RELEASE_TAG}|" "$CONFIG_FILE"
            echo "Updated APPLICATION_VERSION in ${CONFIG_FILE}"
          else
            echo "APPLICATION_VERSION=${RELEASE_TAG}" >> "$CONFIG_FILE"
            echo "Added APPLICATION_VERSION to ${CONFIG_FILE}"
          fi

          echo "Config env:"
          cat "$CONFIG_FILE"

      - name: Commit and push changes
        uses: NeuralTrust/workflows/.github/actions/git-commit-push@main
        with:
          branch: main
          message: ${{ needs.release.outputs.strategy }} ${{ inputs.image_name }} ${{ needs.release.outputs.release_tag }} in ${{ inputs.overlay_path }}
          paths: |
            ${{ inputs.overlay_path }}/kustomization.yaml
            ${{ inputs.overlay_path }}/${{ inputs.config_env_file }}

      - name: Deployment summary
        run: |
          OVERLAY_DIR="${{ inputs.overlay_path }}"
          STRATEGY="${{ needs.release.outputs.strategy }}"

          echo "## Deployment Updated" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Strategy:** \`${STRATEGY}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Image:** \`${{ needs.release.outputs.image_ref }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Overlay:** \`${OVERLAY_DIR}\`" >> "$GITHUB_STEP_SUMMARY"

  # ============================================================================
  # Job 3: Slack Notification
  # ============================================================================
  notify:
    name: Slack Notification
    needs: [release, scan, promote-copy, update-kustomization]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Send Slack notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "No Slack webhook configured, skipping"
            exit 0
          fi

          RELEASE_RESULT="${{ needs.release.result }}"
          SCAN_RESULT="${{ needs.scan.result }}"
          PROMOTE_COPY_RESULT="${{ needs.promote-copy.result }}"
          KUSTOMIZE_RESULT="${{ needs.update-kustomization.result }}"
          STRATEGY="${{ needs.release.outputs.strategy }}"

          if [ "$RELEASE_RESULT" = "success" ] \
             && [ "$SCAN_RESULT" = "success" ] \
             && ([ "$PROMOTE_COPY_RESULT" = "success" ] || [ "$PROMOTE_COPY_RESULT" = "skipped" ]) \
             && ([ "$KUSTOMIZE_RESULT" = "success" ] || [ "$KUSTOMIZE_RESULT" = "skipped" ]); then
            COLOR="#36a64f"
            STATUS="Released"
            if [ "$STRATEGY" = "promote" ]; then
              EMOJI=":rocket:"
              METHOD="promoted from dev"
            else
              EMOJI=":white_check_mark:"
              METHOD="rebuilt (hotfix)"
            fi
          elif [ "$SCAN_RESULT" = "failure" ]; then
            COLOR="#dc3545"
            STATUS="Blocked by image scan"
            EMOJI=":no_entry:"
            METHOD="CRITICAL/HIGH fixable CVEs found"
          else
            COLOR="#dc3545"
            STATUS="Failed"
            EMOJI=":x:"
            METHOD="${STRATEGY}"
          fi

          curl -sf "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "$(jq -n \
              --arg color "$COLOR" \
              --arg status "$STATUS" \
              --arg emoji "$EMOJI" \
              --arg method "$METHOD" \
              --arg repo "${{ github.repository }}" \
              --arg image "${{ inputs.image_name }}" \
              --arg tag "${{ needs.release.outputs.release_tag }}" \
              --arg url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              --arg actor "${{ github.actor }}" \
              '{
                "attachments": [{
                  "color": $color,
                  "blocks": [
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": ($emoji + " *" + $status + "* | `" + $repo + "`")
                      }
                    },
                    {
                      "type": "section",
                      "fields": [
                        {"type": "mrkdwn", "text": ("*Release:*\n`" + $tag + "`")},
                        {"type": "mrkdwn", "text": ("*Image:*\n`" + $image + "`")},
                        {"type": "mrkdwn", "text": ("*Strategy:*\n" + $method)},
                        {"type": "mrkdwn", "text": ("*Workflow:*\n<" + $url + "|View Run>")}
                      ]
                    }
                  ]
                }]
              }'
            )" || echo "::warning::Slack notification failed"
