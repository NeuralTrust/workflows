# ==============================================================================
# Reusable Workflow: AI-Powered Semantic Version Bump
# ==============================================================================
# Analyzes commits since the last release using OpenAI and determines the
# appropriate semver bump (major, minor, patch) per https://semver.org/
#
# Creates a GitHub Release with the new version tag. The release event then
# triggers the repo's release.yml workflow for building and deploying.
#
# Usage:
#   jobs:
#     release:
#       uses: NeuralTrust/workflows/.github/workflows/ai-release-bump.yml@main
#       secrets:
#         OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
#         GH_TOKEN: ${{ secrets.GH_TOKEN }}
#
# Note: GH_TOKEN must be a PAT (not GITHUB_TOKEN) so the created release
#       event can trigger other workflows (release.yml).
#
# Loop guard: pushes whose head commit message starts with `chore: bump version`
# or `docs(changelog):` exit early (see bump-guard). The first covers the
# automated semver bump this workflow itself produces; the second covers
# pushes made by `openspec-changelog.yml`. Callers should also use paths-ignore
# on push (e.g. k8s/**, .github/**) so overlay-only commits do not retrigger
# this workflow.
# ==============================================================================

name: AI Release Bump

on:
  workflow_call:
    inputs:
      model:
        description: 'OpenAI model to use for semver classification'
        required: false
        type: string
        default: 'gpt-4o-mini'
      default_bump:
        description: 'Default bump type if AI classification fails'
        required: false
        type: string
        default: 'patch'
      initial_version:
        description: 'Initial version if no previous tags exist'
        required: false
        type: string
        default: 'v0.1.0'
      tag_prefix:
        description: 'Prefix for version tags'
        required: false
        type: string
        default: 'v'
      dry_run:
        description: 'If true, compute version but do not create release'
        required: false
        type: boolean
        default: false
      version_update_script:
        description: 'Shell commands to update version files before creating the release. Env vars available: VERSION (bare, e.g. 1.2.3), TAG (with prefix, e.g. v1.2.3). Follow-up pushes use chore bump message + bump-guard so auto-release does not loop.'
        required: false
        type: string
        default: ''
      update_changelog:
        description: 'If true, promote `## [Unreleased]` to `## [vX.Y.Z] — YYYY-MM-DD` in the changelog file before tagging.'
        required: false
        type: boolean
        default: true
      changelog_path:
        description: 'Path of the changelog file to promote when update_changelog is true.'
        required: false
        type: string
        default: 'CHANGELOG.md'
      unreleased_heading:
        description: 'Heading used for the unreleased section in the changelog (must match exactly).'
        required: false
        type: string
        default: '## [Unreleased]'
    secrets:
      OPENAI_API_KEY:
        required: true
        description: 'OpenAI API key for semver classification'
      GH_TOKEN:
        required: true
        description: 'GitHub PAT with contents:write — needed to trigger release.yml'
    outputs:
      new_version:
        description: 'The new version tag (e.g., v1.2.3)'
        value: ${{ jobs.bump.outputs.new_version }}
      bump_type:
        description: 'The bump type (major, minor, patch)'
        value: ${{ jobs.bump.outputs.bump_type }}
      previous_version:
        description: 'The previous version tag'
        value: ${{ jobs.bump.outputs.previous_version }}

concurrency:
  group: auto-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bump:
    name: AI Semver Bump
    runs-on: ubuntu-latest
    timeout-minutes: 20

    outputs:
      new_version: ${{ steps.version.outputs.new_version }}
      bump_type: ${{ steps.ai.outputs.bump_type }}
      previous_version: ${{ steps.latest-tag.outputs.tag }}

    permissions:
      contents: write

    steps:
      - name: Skip if push is only the automated version bump or a changelog feed
        id: bump-guard
        env:
          HEAD_MSG: ${{ github.event.head_commit.message }}
        run: |
          skip=false
          reason=""
          if [ -n "${HEAD_MSG:-}" ]; then
            if printf '%s' "$HEAD_MSG" | grep -q 'chore: bump version to'; then
              skip=true
              reason="automated semver file bump"
            elif printf '%s' "$HEAD_MSG" | grep -q '^docs(changelog):'; then
              skip=true
              reason="openspec changelog feed commit"
            fi
          fi
          echo "skip=${skip}" >> "$GITHUB_OUTPUT"
          if [ "$skip" = "true" ]; then
            echo "Skipping: $reason."
          fi

      - name: Checkout code
        if: steps.bump-guard.outputs.skip != 'true'
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Get latest version tag
        id: latest-tag
        if: steps.bump-guard.outputs.skip != 'true'
        run: |
          # Find the latest semver tag (v*.*.*)
          LATEST_TAG=$(git tag -l '${{ inputs.tag_prefix }}*' --sort=-v:refname | head -1)

          if [ -z "$LATEST_TAG" ]; then
            echo "No previous version tags found."
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "version=0.0.0" >> "$GITHUB_OUTPUT"
          else
            echo "Latest tag: $LATEST_TAG"
            echo "tag=${LATEST_TAG}" >> "$GITHUB_OUTPUT"
            # Strip tag prefix to get version number
            VERSION="${LATEST_TAG#${{ inputs.tag_prefix }}}"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Get commits since last release
        id: commits
        if: steps.bump-guard.outputs.skip != 'true'
        run: |
          if [ -n "${{ steps.latest-tag.outputs.tag }}" ]; then
            COMMITS=$(git log ${{ steps.latest-tag.outputs.tag }}..HEAD --pretty=format:"- %h %s" 2>/dev/null)
            COMMIT_COUNT=$(git log ${{ steps.latest-tag.outputs.tag }}..HEAD --oneline | wc -l | tr -d ' ')
          else
            COMMITS=$(git log --pretty=format:"- %h %s" -50)
            COMMIT_COUNT=$(git log --oneline | wc -l | tr -d ' ')
          fi

          if [ -z "$COMMITS" ] || [ "$COMMIT_COUNT" -eq 0 ]; then
            echo "No new commits since last release."
            echo "has_commits=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Found $COMMIT_COUNT commits since last release."
          echo "has_commits=true" >> "$GITHUB_OUTPUT"
          echo "count=${COMMIT_COUNT}" >> "$GITHUB_OUTPUT"

          # Write commits to file (for the OpenAI request and release notes)
          echo "$COMMITS" > commits.txt

          # Also set as output (truncated for safety)
          TRUNCATED=$(echo "$COMMITS" | head -100)
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "log<<${EOF}" >> "$GITHUB_OUTPUT"
          echo "${TRUNCATED}" >> "$GITHUB_OUTPUT"
          echo "${EOF}" >> "$GITHUB_OUTPUT"

      - name: AI determines semver bump
        id: ai
        if: steps.bump-guard.outputs.skip != 'true' && steps.commits.outputs.has_commits == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          write_output() {
            local name="$1"
            local value="$2"
            local eof
            eof=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
            {
              echo "${name}<<${eof}"
              printf '%s\n' "$value"
              echo "${eof}"
            } >> "$GITHUB_OUTPUT"
          }

          cat > request.json << 'REQEOF'
          {
            "model": "${{ inputs.model }}",
            "response_format": { "type": "json_object" },
            "messages": [
              {
                "role": "system",
                "content": "You are a semver expert. Given a list of git commits, determine the appropriate version bump according to https://semver.org/\n\nRules:\n- MAJOR: incompatible API changes, breaking changes (look for: 'BREAKING CHANGE', 'breaking:', major refactors that change interfaces)\n- MINOR: new features, new endpoints, new capabilities added in a backward-compatible manner (look for: 'feat:', 'feature:', 'add:', new functionality)\n- PATCH: bug fixes, documentation, refactoring, dependency updates, CI changes, tests (look for: 'fix:', 'docs:', 'refactor:', 'chore:', 'ci:', 'test:')\n\nWhen in doubt, prefer PATCH over MINOR, and MINOR over MAJOR.\n\nRespond with ONLY a JSON object:\n{\"bump\": \"major|minor|patch\", \"reason\": \"one sentence explanation\"}"
              },
              {
                "role": "user",
                "content": COMMITS_PLACEHOLDER
              }
            ],
            "max_tokens": 200,
            "temperature": 0
          }
          REQEOF

          # Replace placeholder with actual commits (handles special characters)
          python3 -c "
          import json, sys
          with open('request.json') as f:
              data = f.read()
          with open('commits.txt') as f:
              commits = f.read()
          data = data.replace('COMMITS_PLACEHOLDER', json.dumps('Current version: ${{ steps.latest-tag.outputs.version }}\n\nCommits since last release:\n' + commits))
          with open('request.json', 'w') as f:
              f.write(data)
          "

          # Call OpenAI API
          RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -d @request.json)

          # Check for API errors
          if echo "$RESPONSE" | jq -e '.error' > /dev/null 2>&1; then
            ERROR=$(echo "$RESPONSE" | jq -r '.error.message')
            echo "::warning::OpenAI API error: $ERROR — defaulting to ${{ inputs.default_bump }}"
            echo "bump_type=${{ inputs.default_bump }}" >> "$GITHUB_OUTPUT"
            write_output "reason" "OpenAI API error, defaulting to ${{ inputs.default_bump }}"
            exit 0
          fi

          # Extract the classification
          AI_RESPONSE=$(echo "$RESPONSE" | jq -r '.choices[0].message.content')

          if ! echo "$AI_RESPONSE" | jq empty 2>/dev/null; then
            echo "::warning::Invalid AI response — defaulting to ${{ inputs.default_bump }}"
            echo "bump_type=${{ inputs.default_bump }}" >> "$GITHUB_OUTPUT"
            write_output "reason" "Invalid AI response, defaulting to ${{ inputs.default_bump }}"
            exit 0
          fi

          BUMP_TYPE=$(echo "$AI_RESPONSE" | jq -r '.bump')
          REASON=$(echo "$AI_RESPONSE" | jq -r '.reason')

          # Validate bump type
          case "$BUMP_TYPE" in
            major|minor|patch) ;;
            *)
              echo "::warning::Invalid bump type '$BUMP_TYPE' — defaulting to ${{ inputs.default_bump }}"
              BUMP_TYPE="${{ inputs.default_bump }}"
              REASON="Invalid AI classification, defaulting to ${{ inputs.default_bump }}"
              ;;
          esac

          LOG_REASON=$(printf '%s' "$REASON" | sed 's/^::/: :/')
          echo "AI classification: $BUMP_TYPE — $LOG_REASON"
          echo "bump_type=${BUMP_TYPE}" >> "$GITHUB_OUTPUT"
          write_output "reason" "$REASON"

      - name: Compute new version
        id: version
        if: steps.bump-guard.outputs.skip != 'true' && steps.commits.outputs.has_commits == 'true'
        run: |
          CURRENT="${{ steps.latest-tag.outputs.version }}"
          BUMP="${{ steps.ai.outputs.bump_type }}"
          PREFIX="${{ inputs.tag_prefix }}"

          # Handle initial version (no previous tags)
          if [ -z "$CURRENT" ] || [ "$CURRENT" = "0.0.0" ]; then
            NEW_VERSION="${{ inputs.initial_version }}"
            echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
            echo "Initial release: ${NEW_VERSION}"
            exit 0
          fi

          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)

          case "$BUMP" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="${PREFIX}${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version bump: ${PREFIX}${CURRENT} → ${NEW_VERSION} ($BUMP)"

      - name: Promote CHANGELOG Unreleased → versioned section
        if: steps.bump-guard.outputs.skip != 'true' && steps.commits.outputs.has_commits == 'true' && inputs.update_changelog == true && inputs.dry_run == false
        env:
          CHANGELOG_PATH: ${{ inputs.changelog_path }}
          UNRELEASED_HEADING: ${{ inputs.unreleased_heading }}
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
        run: |
          if [ ! -f "${CHANGELOG_PATH}" ]; then
            echo "${CHANGELOG_PATH} does not exist; skipping promotion."
            exit 0
          fi
          python3 - <<'PY'
          """Promote `## [Unreleased]` to `## [vX.Y.Z] — YYYY-MM-DD`.

          The Unreleased section is preserved (left empty) so future PRs keep
          appending to it. If the Unreleased section has no body, no promotion
          happens and the file is left untouched.
          """
          import os
          import re
          import sys
          from datetime import date
          from pathlib import Path

          path = Path(os.environ["CHANGELOG_PATH"])
          heading = os.environ["UNRELEASED_HEADING"]
          new_version = os.environ["NEW_VERSION"]

          text = path.read_text(encoding="utf-8")
          if heading not in text:
              print(f"Heading {heading!r} not found in {path}; skipping promotion.")
              sys.exit(0)

          lines = text.splitlines()
          start = None
          end = len(lines)
          for i, line in enumerate(lines):
              if line.strip() == heading:
                  start = i + 1
                  continue
              if start is not None and line.startswith("## "):
                  end = i
                  break
          if start is None:
              print("Could not locate Unreleased bounds; skipping.")
              sys.exit(0)

          body = lines[start:end]
          while body and not body[0].strip():
              body.pop(0)
          while body and not body[-1].strip():
              body.pop()

          if not body:
              print("Unreleased section is empty; nothing to promote.")
              sys.exit(0)

          today = date.today().isoformat()
          new_section = [heading, "", f"## [{new_version}] — {today}", ""] + body + [""]
          rebuilt = lines[: start - 1] + new_section + lines[end:]
          out = "\n".join(rebuilt).rstrip() + "\n"
          path.write_text(out, encoding="utf-8")
          print(f"Promoted Unreleased → {new_version} in {path}.")
          PY

      - name: Update version files
        if: steps.bump-guard.outputs.skip != 'true' && steps.commits.outputs.has_commits == 'true' && inputs.version_update_script != '' && inputs.dry_run == false
        env:
          TAG: ${{ steps.version.outputs.new_version }}
          VERSION: ${{ steps.version.outputs.new_version }}
        run: |
          # Strip tag prefix to get bare version (e.g. v1.2.3 → 1.2.3)
          VERSION="${TAG#${{ inputs.tag_prefix }}}"
          export VERSION

          echo "Updating version files to ${VERSION} (tag: ${TAG})..."
          set -e
          ${{ inputs.version_update_script }}

      - name: Commit and push version files
        id: commit-version
        if: steps.bump-guard.outputs.skip != 'true' && steps.commits.outputs.has_commits == 'true' && inputs.dry_run == false
        uses: NeuralTrust/workflows/.github/actions/git-commit-push@main
        with:
          branch: ${{ github.ref_name }}
          message: "chore: bump version to ${{ steps.version.outputs.new_version }}"
          paths: |
            .

      - name: Create GitHub Release
        if: steps.bump-guard.outputs.skip != 'true' && steps.commits.outputs.has_commits == 'true' && inputs.dry_run == false
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          VERSION: ${{ steps.version.outputs.new_version }}
          BUMP: ${{ steps.ai.outputs.bump_type }}
          REASON: ${{ steps.ai.outputs.reason }}
          PREVIOUS: ${{ steps.latest-tag.outputs.tag }}
          VERSION_COMMIT_SHA: ${{ steps.commit-version.outputs.sha }}
        run: |
          # Use the version-commit SHA if we pushed one, otherwise the original SHA
          TARGET_SHA="${VERSION_COMMIT_SHA}"
          if [ -z "$TARGET_SHA" ] || [ "$TARGET_SHA" = "" ]; then
            TARGET_SHA="${{ github.sha }}"
          fi

          # Build release notes. Consuming repos (e.g. neuraltrust-platform
          # publish-chart.yml) append Container images + Installation after this.
          cat > release_notes.md << EOF
          ## What changed

          **${BUMP} release** — ${REASON}

          ### Commits

          $(cat commits.txt)
          EOF

          if [ -n "$PREVIOUS" ]; then
            TITLE="${VERSION} (from ${PREVIOUS})"
          else
            TITLE="${VERSION} (initial release)"
          fi

          echo "Creating release: $VERSION (target: ${TARGET_SHA})"
          gh release create "$VERSION" \
            --title "$TITLE" \
            --notes-file release_notes.md \
            --target "$TARGET_SHA"

          echo "## Release Created" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** \`${VERSION}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Bump:** ${BUMP}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Reason:** ${REASON}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Previous:** \`${PREVIOUS:-none}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Skip — no new commits
        if: steps.bump-guard.outputs.skip != 'true' && steps.commits.outputs.has_commits != 'true'
        run: |
          echo "No new commits since last release. Skipping version bump."
          echo "## No Release Needed" >> "$GITHUB_STEP_SUMMARY"
          echo "No new commits since last release." >> "$GITHUB_STEP_SUMMARY"

      - name: Summary — skipped after version bump commit
        if: steps.bump-guard.outputs.skip == 'true'
        run: |
          echo "## Skipped" >> "$GITHUB_STEP_SUMMARY"
          echo "Push is only the automated semver file bump; auto-release will not run again until substantive commits land." >> "$GITHUB_STEP_SUMMARY"
