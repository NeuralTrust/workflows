# ==============================================================================
# Reusable Workflow: Update Kustomization and Push
# ==============================================================================
# Updates image tags in kustomization.yaml based on branch (develop→dev, main→prod),
# then commits and pushes. Callers should use paths-ignore (e.g. k8s/**) on deploy
# workflows so these pushes do not retrigger build loops.
#
# Supports updating multiple images in a single kustomization.yaml file.
#
# Usage:
#   jobs:
#     deploy:
#       uses: NeuralTrust/workflows/.github/workflows/update-kustomization.yml@main
#       with:
#         images: '[{"kustomize_name":"my-app","image_name":"my-app"}]'
#         image_tag: ${{ needs.build.outputs.image_tag }}
#         gcp_project_id: my-gcp-project
#       secrets:
#         GH_TOKEN: ${{ secrets.GH_TOKEN }}
# ==============================================================================

name: Update Kustomization

on:
  workflow_call:
    inputs:
      images:
        description: >
          JSON array of image configs to update in kustomization.yaml.
          Each object: {"kustomize_name": "name-in-kustomize", "image_name": "name-in-registry"}
          Example: [{"kustomize_name":"app","image_name":"app"}]
        required: true
        type: string
      image_tag:
        description: 'Image tag to set (typically the commit SHA)'
        required: true
        type: string
      gcp_project_id:
        description: 'GCP Project ID for image registry reference'
        required: true
        type: string
      registry:
        description: 'Docker registry host'
        required: false
        type: string
        default: 'europe-west1-docker.pkg.dev'
      repository:
        description: 'Artifact Registry repository name'
        required: false
        type: string
        default: 'nt-docker'
      overlay_dev_path:
        description: 'Path to dev overlay directory'
        required: false
        type: string
        default: 'k8s/overlays/dev'
      overlay_prod_path:
        description: 'Path to prod overlay directory'
        required: false
        type: string
        default: 'k8s/overlays/prod'
      overlay_path:
        description: 'Direct path to overlay directory (overrides branch-based detection). Use for release workflows.'
        required: false
        type: string
        default: ''
      target_branch:
        description: 'Branch to checkout and push to (overrides github.ref_name). Required when overlay_path is set.'
        required: false
        type: string
        default: ''
      commit_message_prefix:
        description: 'Prefix for the commit message (e.g., service name)'
        required: false
        type: string
        default: ''
    secrets:
      GH_TOKEN:
        required: true
        description: 'GitHub token (PAT or App token) with push permissions to the repo'

jobs:
  update-kustomization:
    name: Update Kustomization
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Run on branch pushes (develop/main) or when overlay_path is explicitly set (release workflows)
    if: >-
      inputs.overlay_path != '' ||
      (github.ref_type == 'branch' && (github.ref_name == 'develop' || github.ref_name == 'main'))

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_TOKEN }}
          ref: ${{ inputs.target_branch || github.ref_name }}
          fetch-depth: 0

      - name: Determine overlay directory
        id: overlay
        run: |
          if [ -n "${{ inputs.overlay_path }}" ]; then
            echo "dir=${{ inputs.overlay_path }}" >> "$GITHUB_OUTPUT"
          else
            case "${{ github.ref_name }}" in
              develop)
                echo "dir=${{ inputs.overlay_dev_path }}" >> "$GITHUB_OUTPUT"
                ;;
              main)
                echo "dir=${{ inputs.overlay_prod_path }}" >> "$GITHUB_OUTPUT"
                ;;
            esac
          fi

      - name: Update kustomization.yaml
        uses: NeuralTrust/workflows/.github/actions/kustomize-set-images@main
        with:
          overlay_dir: ${{ steps.overlay.outputs.dir }}
          images: ${{ inputs.images }}
          image_tag: ${{ inputs.image_tag }}
          registry: ${{ inputs.registry }}
          gcp_project_id: ${{ inputs.gcp_project_id }}
          repository: ${{ inputs.repository }}

      - name: Compute commit message
        id: commit-message
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          PREFIX: ${{ inputs.commit_message_prefix }}
          OVERLAY_DIR: ${{ steps.overlay.outputs.dir }}
        run: |
          SHORT_SHA="${IMAGE_TAG:0:12}"
          if [ -n "$PREFIX" ]; then
            echo "message=update ${PREFIX} image tag to ${SHORT_SHA} in ${OVERLAY_DIR}" >> "$GITHUB_OUTPUT"
          else
            echo "message=update image tag to ${SHORT_SHA} in ${OVERLAY_DIR}" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push changes
        uses: NeuralTrust/workflows/.github/actions/git-commit-push@main
        with:
          branch: ${{ inputs.target_branch || github.ref_name }}
          message: ${{ steps.commit-message.outputs.message }}
          paths: |
            ${{ steps.overlay.outputs.dir }}/kustomization.yaml

      - name: Kustomization summary
        run: |
          OVERLAY_DIR="${{ steps.overlay.outputs.dir }}"
          IMAGE_TAG="${{ inputs.image_tag }}"

          {
            echo "## Kustomization Updated"
            echo ""
            echo "- **Overlay:** \`${OVERLAY_DIR}\`"
            echo "- **Tag:** \`${IMAGE_TAG}\`"
            echo "- **Branch:** \`${{ github.ref_name }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
