# ==============================================================================
# Reusable Workflow: OpenSpec Changelog Feed
# ==============================================================================
# When a PR is merged into main, scans the PR for `proposal.md` files under the
# configured scope directories (default: `openspec/changes`, `openspec/fixes`),
# extracts a one-line summary from each, and appends entries to CHANGELOG.md
# under `## [Unreleased]` following the Keep a Changelog format.
#
# Expected proposal.md frontmatter:
#   ---
#   linear: ENG-415          # optional, used to link the Linear issue
#   type: breaking           # required: breaking | feat | fix | refactor | perf | chore | docs | security
#   changelog: "One-line summary that ends up in the changelog."  # optional, falls back to the H1
#   ---
#   # Proposal: <title>
#
# Usage:
#   on:
#     pull_request:
#       types: [closed]
#       branches: [main]
#
#   permissions:
#     contents: write
#
#   jobs:
#     feed:
#       if: github.event.pull_request.merged == true
#       uses: NeuralTrust/workflows/.github/workflows/openspec-changelog.yml@main
#       secrets:
#         GH_TOKEN: ${{ secrets.GH_TOKEN }}
#
# Note: GH_TOKEN must be a PAT (not GITHUB_TOKEN). Pushes from GITHUB_TOKEN do
#       not trigger other workflows (e.g. auto-release.yml will not pick the
#       commit up). The downstream auto-release should skip `docs(changelog):`
#       commits in its bump-guard.
# ==============================================================================

name: OpenSpec Changelog Feed

on:
  workflow_call:
    inputs:
      changelog_path:
        description: 'Path of the CHANGELOG file to update'
        required: false
        type: string
        default: 'CHANGELOG.md'
      unreleased_heading:
        description: 'Heading for the unreleased section (must match exactly)'
        required: false
        type: string
        default: '## [Unreleased]'
      scope_dirs:
        description: 'Comma-separated list of openspec directories to scan'
        required: false
        type: string
        default: 'openspec/changes,openspec/fixes'
      linear_team:
        description: 'Linear team slug for issue URLs (used when proposal has linear: ENG-XXX)'
        required: false
        type: string
        default: 'neuraltrust'
      commit_message_prefix:
        description: 'Prefix used for the changelog commit message. Must be allow-listed by auto-release.yml bump-guard.'
        required: false
        type: string
        default: 'docs(changelog):'
    secrets:
      GH_TOKEN:
        required: true
        description: 'GitHub PAT with contents:write on the caller repo'

jobs:
  feed:
    name: Feed CHANGELOG from openspec proposals
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Update CHANGELOG from PR openspec proposals
        id: update
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          CHANGELOG_PATH: ${{ inputs.changelog_path }}
          UNRELEASED_HEADING: ${{ inputs.unreleased_heading }}
          SCOPE_DIRS: ${{ inputs.scope_dirs }}
          LINEAR_TEAM: ${{ inputs.linear_team }}
        run: |
          python3 - <<'PY'
          """Append openspec proposal summaries to the CHANGELOG Unreleased section."""
          import os
          import re
          import subprocess
          import sys
          from pathlib import Path

          PR_NUMBER = int(os.environ["PR_NUMBER"])
          PR_URL = os.environ["PR_URL"]
          PR_TITLE = os.environ.get("PR_TITLE", "")
          CHANGELOG_PATH = Path(os.environ.get("CHANGELOG_PATH", "CHANGELOG.md"))
          UNRELEASED_HEADING = os.environ.get("UNRELEASED_HEADING", "## [Unreleased]")
          SCOPE_DIRS = [
              d.strip().rstrip("/")
              for d in os.environ.get("SCOPE_DIRS", "openspec/changes,openspec/fixes").split(",")
              if d.strip()
          ]
          LINEAR_TEAM = os.environ.get("LINEAR_TEAM", "neuraltrust")

          CATEGORY_MAP = {
              "breaking": "Breaking",
              "feat": "Added",
              "feature": "Added",
              "fix": "Fixed",
              "refactor": "Changed",
              "perf": "Changed",
              "chore": "Changed",
              "docs": "Docs",
              "security": "Security",
          }
          CATEGORY_ORDER = ["Breaking", "Added", "Changed", "Fixed", "Docs", "Security"]


          def parse_frontmatter(text):
              m = re.match(r"^---\n(.*?)\n---\n", text, re.DOTALL)
              if not m:
                  return {}, text
              fm = {}
              for line in m.group(1).splitlines():
                  if ":" not in line:
                      continue
                  key, _, value = line.partition(":")
                  fm[key.strip()] = value.strip().strip('"').strip("'")
              return fm, text[m.end():]


          def title_from_h1(body, fallback):
              m = re.search(r"^#\s+(.+?)\s*$", body, re.MULTILINE)
              if not m:
                  return fallback
              return m.group(1).split(":", 1)[-1].strip() if m.group(1).lower().startswith("proposal:") else m.group(1).strip()


          def changed_proposal_paths():
              proc = subprocess.run(
                  ["gh", "pr", "view", str(PR_NUMBER), "--json", "files", "-q", ".files[].path"],
                  capture_output=True, text=True, check=True,
              )
              keep = []
              for path in proc.stdout.strip().splitlines():
                  if not path:
                      continue
                  parts = path.split("/")
                  if len(parts) < 3 or parts[-1] != "proposal.md":
                      continue
                  prefix = "/".join(parts[:2])
                  if prefix in SCOPE_DIRS:
                      keep.append(path)
              return keep


          def build_entry(path):
              p = Path(path)
              if not p.exists():
                  return None
              text = p.read_text(encoding="utf-8")
              fm, body = parse_frontmatter(text)
              change_name = p.parent.name
              title = title_from_h1(body, change_name)
              type_ = (fm.get("type") or "chore").lower()
              category = CATEGORY_MAP.get(type_, "Changed")
              summary = (fm.get("changelog") or title).strip().rstrip(".")
              linear = fm.get("linear")
              bullet = f"- **{title}** ([#{PR_NUMBER}]({PR_URL})) — {summary}."
              if linear:
                  bullet += f" ([{linear}](https://linear.app/{LINEAR_TEAM}/issue/{linear.lower()}))"
              return category, bullet


          def ensure_changelog_exists():
              if CHANGELOG_PATH.exists():
                  return
              CHANGELOG_PATH.write_text(
                  "# Changelog\n\n"
                  "All notable changes are listed here in "
                  "[Keep a Changelog](https://keepachangelog.com/en/1.1.0/) format.\n\n"
                  f"{UNRELEASED_HEADING}\n",
                  encoding="utf-8",
              )


          def find_unreleased_bounds(lines):
              start = None
              end = len(lines)
              for i, line in enumerate(lines):
                  if line.strip() == UNRELEASED_HEADING:
                      start = i + 1
                      continue
                  if start is not None and line.startswith("## "):
                      end = i
                      break
              return start, end


          def upsert_entries(entries):
              text = CHANGELOG_PATH.read_text(encoding="utf-8")
              if UNRELEASED_HEADING not in text:
                  if text.startswith("# Changelog"):
                      text = text.replace("# Changelog\n", "# Changelog\n\n" + UNRELEASED_HEADING + "\n", 1)
                  else:
                      text = UNRELEASED_HEADING + "\n\n" + text

              lines = text.splitlines()
              start, end = find_unreleased_bounds(lines)
              if start is None:
                  return False

              sub = {}
              order = []
              cur = None
              for i in range(start, end):
                  line = lines[i]
                  m = re.match(r"^###\s+(.+?)\s*$", line)
                  if m:
                      cur = m.group(1).strip()
                      sub.setdefault(cur, [])
                      if cur not in order:
                          order.append(cur)
                      continue
                  if cur is None:
                      continue
                  if line.strip():
                      sub[cur].append(line)

              changed = False
              for category, bullet in entries:
                  sub.setdefault(category, [])
                  if category not in order:
                      order.append(category)
                  if bullet in sub[category]:
                      continue
                  sub[category].append(bullet)
                  changed = True

              if not changed:
                  return False

              rebuilt = [""]
              seen = set()
              for cat in CATEGORY_ORDER:
                  if sub.get(cat):
                      rebuilt.append(f"### {cat}")
                      rebuilt.extend(sub[cat])
                      rebuilt.append("")
                      seen.add(cat)
              for cat in order:
                  if cat in seen or not sub.get(cat):
                      continue
                  rebuilt.append(f"### {cat}")
                  rebuilt.extend(sub[cat])
                  rebuilt.append("")

              new_lines = lines[:start] + rebuilt + lines[end:]
              new_text = "\n".join(new_lines).rstrip() + "\n"
              if new_text == text:
                  return False
              CHANGELOG_PATH.write_text(new_text, encoding="utf-8")
              return True


          paths = changed_proposal_paths()
          if not paths:
              print("No openspec proposals modified in this PR; nothing to do.")
              sys.exit(0)

          entries = []
          for path in paths:
              entry = build_entry(path)
              if entry:
                  entries.append(entry)

          if not entries:
              print("No entries built from changed proposals.")
              sys.exit(0)

          ensure_changelog_exists()
          if not upsert_entries(entries):
              print("All entries already present in CHANGELOG; nothing to commit.")
              sys.exit(0)

          subprocess.run(["git", "add", str(CHANGELOG_PATH)], check=True)
          gh_out = os.environ.get("GITHUB_OUTPUT")
          if gh_out:
              with open(gh_out, "a") as fh:
                  fh.write("changed=true\n")
          print(f"Updated {CHANGELOG_PATH} with {len(entries)} entries.")
          PY

      - name: Commit and push CHANGELOG update
        if: steps.update.outputs.changed == 'true'
        uses: NeuralTrust/workflows/.github/actions/git-commit-push@main
        with:
          branch: main
          message: ${{ inputs.commit_message_prefix }} add entry for #${{ github.event.pull_request.number }}
          paths: |
            ${{ inputs.changelog_path }}

      - name: Summary
        if: always()
        run: |
          {
            echo "## OpenSpec Changelog Feed"
            echo ""
            if [ "${{ steps.update.outputs.changed }}" = "true" ]; then
              echo "Appended entry/entries from PR #${{ github.event.pull_request.number }} to \`${{ inputs.changelog_path }}\`."
            else
              echo "No CHANGELOG changes required for PR #${{ github.event.pull_request.number }}."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
