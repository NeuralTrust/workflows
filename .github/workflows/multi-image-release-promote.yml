# ==============================================================================
# Reusable Workflow: Multi-Image Smart Release (promote or rebuild)
# ==============================================================================
# Same as release-promote.yml but handles multiple Docker images in parallel.
#
#   develop → main PR  →  PROMOTE: crane copy all images from dev to prod
#   hotfix / direct push →  REBUILD: docker build all images
#
# Usage:
#   jobs:
#     release:
#       uses: NeuralTrust/workflows/.github/workflows/multi-image-release-promote.yml@main
#       with:
#         images: '[{"name":"api","target":"api"},{"name":"cli","target":"cli"}]'
#         kustomize_images: '[{"kustomize_name":"api","image_name":"api"}]'
#         gcp_project_id: prod-project-id
#         dev_gcp_project_id: dev-project-id
#       secrets: inherit
# ==============================================================================

name: Multi-Image Smart Release

on:
  workflow_call:
    inputs:
      images:
        description: 'JSON array of image configs: [{"name":"X","target":"Y","tag_prefix":"","tag_suffix":"","build_args":"","dockerfile":"Dockerfile","context":"."}]'
        required: true
        type: string
      kustomize_images:
        description: 'JSON array for kustomization: [{"kustomize_name":"X","image_name":"Y"}]'
        required: true
        type: string
      gcp_project_id:
        description: 'Prod GCP Project ID (destination)'
        required: true
        type: string
      dev_gcp_project_id:
        description: 'Dev GCP Project ID (source for promote)'
        required: true
        type: string
      registry:
        description: 'Artifact Registry host'
        required: false
        type: string
        default: 'europe-west1-docker.pkg.dev'
      repository:
        description: 'Artifact Registry repository name'
        required: false
        type: string
        default: 'nt-docker'
      overlay_path:
        description: 'Path to prod kustomize overlay'
        required: false
        type: string
        default: 'k8s/overlays/prod'
      config_env_file:
        description: 'Name of the config env file in the overlay'
        required: false
        type: string
        default: 'config.env'
      commit_message_prefix:
        description: 'Prefix for the kustomization commit message'
        required: false
        type: string
        default: ''
      free_disk_space:
        description: 'Free disk space before build (needed for large images like pytorch/cuda)'
        required: false
        type: boolean
        default: false
      runner:
        description: 'GitHub Actions runner label'
        required: false
        type: string
        default: 'ubuntu-latest'
      dev_branch:
        description: 'Name of the development branch (for PR detection)'
        required: false
        type: string
        default: 'develop'
    secrets:
      WIF_PROVIDER:
        required: true
      WIF_SERVICE_ACCOUNT:
        required: true
      BUILD_SECRETS:
        required: false
      GH_TOKEN:
        required: true
      SLACK_WEBHOOK_URL:
        required: false
      DOCKER_SECRETS:
        required: false
        description: 'Newline-separated Docker build secrets (e.g. for mount-type secrets in Dockerfile)'

jobs:
  # ============================================================================
  # Job 0: Detect strategy (runs once, shared by matrix)
  # ============================================================================
  detect:
    name: Detect release strategy
    runs-on: ubuntu-latest

    outputs:
      strategy: ${{ steps.strategy.outputs.final }}
      dev_sha: ${{ steps.detect.outputs.dev_sha }}

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect source PR
        id: detect
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_DATA=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }}/pulls 2>/dev/null || echo '[]')

          # Use 'objects' filter to skip any non-object entries in the API response
          DEV_PR=$(echo "$PR_DATA" | jq -r '
            [.[] | objects | select(
              .base.ref == "main" and
              (.head.ref == "${{ inputs.dev_branch }}" or .head.ref == "dev") and
              .merged_at != null
            )] | first // empty' 2>/dev/null || echo '')

          if [ -n "$DEV_PR" ] && [ "$DEV_PR" != "null" ]; then
            PR_NUM=$(echo "$DEV_PR" | jq -r '.number')
            DEV_SHA=$(echo "$DEV_PR" | jq -r '.head.sha')
            echo "Found merged PR #${PR_NUM} from ${{ inputs.dev_branch }} → main"
            echo "initial=promote" >> "$GITHUB_OUTPUT"
            echo "dev_sha=${DEV_SHA}" >> "$GITHUB_OUTPUT"
          else
            # Fallback: check merge commit parents, but ONLY promote if the
            # second parent actually belongs to the dev branch.
            PARENT_COUNT=$(git cat-file -p ${{ github.sha }} | grep -c '^parent ' || true)
            if [ "$PARENT_COUNT" -gt 1 ]; then
              DEV_SHA=$(git rev-parse ${{ github.sha }}^2)
              echo "Merge commit detected, second parent: ${DEV_SHA}"
              # Verify the second parent is on the dev branch
              if git branch -r --contains "$DEV_SHA" 2>/dev/null | grep -qE "origin/(${{ inputs.dev_branch }}|dev)$"; then
                echo "Second parent belongs to ${{ inputs.dev_branch }} branch"
                echo "initial=promote" >> "$GITHUB_OUTPUT"
                echo "dev_sha=${DEV_SHA}" >> "$GITHUB_OUTPUT"
              else
                BRANCH_INFO=$(git branch -r --contains "$DEV_SHA" 2>/dev/null | head -5 || echo "unknown")
                echo "Second parent is NOT on ${{ inputs.dev_branch }} — branches: ${BRANCH_INFO}"
                echo "Treating as rebuild (feature branch or hotfix merge)"
                echo "initial=rebuild" >> "$GITHUB_OUTPUT"
              fi
            else
              echo "No develop→main PR found — hotfix or direct push"
              echo "initial=rebuild" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Resolve final strategy
        id: strategy
        run: |
          INITIAL="${{ steps.detect.outputs.initial }}"

          if [ "$INITIAL" = "promote" ]; then
            # Will verify per-image in the matrix job; set promote as intent
            echo "final=promote" >> "$GITHUB_OUTPUT"
          else
            echo "final=rebuild" >> "$GITHUB_OUTPUT"
          fi

          echo "## Release Strategy: ${INITIAL}" >> "$GITHUB_STEP_SUMMARY"

  # ============================================================================
  # Job 1: Release all images in parallel (matrix)
  # ============================================================================
  release:
    name: Release ${{ matrix.image.name }} (${{ github.ref_name }})
    needs: detect
    runs-on: ${{ inputs.runner }}

    strategy:
      matrix:
        image: ${{ fromJson(inputs.images) }}
      fail-fast: false

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Free disk space
        if: inputs.free_disk_space && needs.detect.outputs.strategy == 'rebuild'
        run: |
          echo "==> Disk before cleanup:"
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost \
            /usr/share/swift /usr/local/.ghcup /opt/hostedtoolcache/CodeQL /usr/local/graalvm \
            /usr/local/share/chromium /usr/local/lib/node_modules
          sudo docker image prune --all --force || true
          echo "==> Disk after cleanup:"
          df -h /

      - name: Checkout code
        uses: actions/checkout@v5

      - name: Compute image metadata
        id: meta
        run: |
          P="${{ matrix.image.tag_prefix }}"
          S="${{ matrix.image.tag_suffix }}"
          RELEASE_TAG="${P}${{ github.ref_name }}${S}"

          PROD_BASE="${{ inputs.registry }}/${{ inputs.gcp_project_id }}/${{ inputs.repository }}/${{ matrix.image.name }}"
          DEV_BASE="${{ inputs.registry }}/${{ inputs.dev_gcp_project_id }}/${{ inputs.repository }}/${{ matrix.image.name }}"

          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "prod_image_base=${PROD_BASE}" >> "$GITHUB_OUTPUT"
          echo "prod_image_ref=${PROD_BASE}:${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "prod_cache_ref=${PROD_BASE}:${P}cache${S}" >> "$GITHUB_OUTPUT"
          echo "prod_latest_ref=${PROD_BASE}:${P}latest${S}" >> "$GITHUB_OUTPUT"
          echo "dev_image_base=${DEV_BASE}" >> "$GITHUB_OUTPUT"

          TAGS="${PROD_BASE}:${RELEASE_TAG}"
          TAGS="${TAGS},${PROD_BASE}:${P}${{ github.sha }}${S}"
          TAGS="${TAGS},${PROD_BASE}:${P}latest${S}"
          TAGS="${TAGS},${PROD_BASE}:${P}cache${S}"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Install crane
        run: |
          curl -sL "https://github.com/google/go-containerregistry/releases/latest/download/go-containerregistry_Linux_x86_64.tar.gz" \
            | tar -xzf - crane
          chmod +x crane
          sudo mv crane /usr/local/bin/

      - name: Login to Artifact Registry (crane)
        run: |
          echo "${{ steps.auth.outputs.access_token }}" | \
            crane auth login ${{ inputs.registry }} -u oauth2accesstoken --password-stdin

      - name: Resolve per-image strategy
        id: strategy
        run: |
          INTENT="${{ needs.detect.outputs.strategy }}"

          if [ "$INTENT" = "promote" ]; then
            DEV_SHA="${{ needs.detect.outputs.dev_sha }}"
            P="${{ matrix.image.tag_prefix }}"
            S="${{ matrix.image.tag_suffix }}"
            DEV_BASE="${{ steps.meta.outputs.dev_image_base }}"
            SHA_REF="${DEV_BASE}:${P}${DEV_SHA}${S}"
            LATEST_REF="${DEV_BASE}:${P}latest${S}"

            echo "Checking dev image by SHA: ${SHA_REF}"

            if crane manifest "${SHA_REF}" > /dev/null 2>&1; then
              echo "Dev image found by commit SHA"
              echo "final=promote" >> "$GITHUB_OUTPUT"
              echo "source_ref=${SHA_REF}" >> "$GITHUB_OUTPUT"
            elif crane manifest "${LATEST_REF}" > /dev/null 2>&1; then
              echo "::notice::${{ matrix.image.name }}: Dev image not found by SHA (likely a [skip ci] commit) — using latest tag from dev registry"
              echo "final=promote" >> "$GITHUB_OUTPUT"
              echo "source_ref=${LATEST_REF}" >> "$GITHUB_OUTPUT"
            else
              echo "::warning::${{ matrix.image.name }}: Dev image not found by SHA or latest tag — falling back to rebuild"
              echo "final=rebuild" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "final=rebuild" >> "$GITHUB_OUTPUT"
          fi

      # ---- PROMOTE PATH ----
      - name: Promote image (dev → prod)
        if: steps.strategy.outputs.final == 'promote'
        run: |
          SOURCE="${{ steps.strategy.outputs.source_ref }}"
          PROD_BASE="${{ steps.meta.outputs.prod_image_base }}"
          P="${{ matrix.image.tag_prefix }}"
          S="${{ matrix.image.tag_suffix }}"
          SHA="${{ github.sha }}"
          RELEASE_TAG="${{ steps.meta.outputs.release_tag }}"

          echo "PROMOTE: ${SOURCE} → ${PROD_BASE}:${RELEASE_TAG}"

          crane copy "${SOURCE}" "${PROD_BASE}:${RELEASE_TAG}"
          crane copy "${SOURCE}" "${PROD_BASE}:${P}${SHA}${S}"
          crane copy "${SOURCE}" "${PROD_BASE}:${P}latest${S}"
          crane copy "${SOURCE}" "${PROD_BASE}:${P}cache${S}"

      # ---- REBUILD PATH ----
      - name: Set up Docker Buildx
        if: steps.strategy.outputs.final == 'rebuild'
        uses: docker/setup-buildx-action@v4

      - name: Login to Artifact Registry (Docker)
        if: steps.strategy.outputs.final == 'rebuild'
        uses: docker/login-action@v4
        with:
          registry: ${{ inputs.registry }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Prepare build args
        if: steps.strategy.outputs.final == 'rebuild'
        id: build-args
        run: |
          APP_VERSION="${{ github.ref_name }}"
          ARGS="APP_VERSION=${APP_VERSION}"

          if [ -n "$IMAGE_ARGS" ]; then
            ARGS="${ARGS}"$'\n'"${IMAGE_ARGS}"
          fi

          if [ -n "$SECRET_ARGS" ]; then
            ARGS="${ARGS}"$'\n'"${SECRET_ARGS}"
          fi

          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "args<<${EOF}" >> "$GITHUB_OUTPUT"
          echo "${ARGS}" >> "$GITHUB_OUTPUT"
          echo "${EOF}" >> "$GITHUB_OUTPUT"
        env:
          IMAGE_ARGS: ${{ matrix.image.build_args }}
          SECRET_ARGS: ${{ secrets.BUILD_SECRETS }}

      - name: Prepare Docker secrets
        if: steps.strategy.outputs.final == 'rebuild'
        id: docker-secrets
        run: |
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "value<<${EOF}" >> "$GITHUB_OUTPUT"
          echo "GCP_ACCESS_TOKEN=${{ steps.auth.outputs.access_token }}" >> "$GITHUB_OUTPUT"
          if [ -n "$DOCKER_SECRETS" ]; then
            echo "$DOCKER_SECRETS" >> "$GITHUB_OUTPUT"
          fi
          echo "${EOF}" >> "$GITHUB_OUTPUT"
        env:
          DOCKER_SECRETS: ${{ secrets.DOCKER_SECRETS }}

      - name: Build and push Docker image
        if: steps.strategy.outputs.final == 'rebuild'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context || '.' }}
          file: ${{ matrix.image.context || '.' }}/${{ matrix.image.dockerfile || 'Dockerfile' }}
          target: ${{ matrix.image.target || '' }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: ${{ steps.build-args.outputs.args }}
          cache-from: |
            type=registry,ref=${{ steps.meta.outputs.prod_cache_ref }}
            type=registry,ref=${{ steps.meta.outputs.prod_latest_ref }}
          secrets: ${{ steps.docker-secrets.outputs.value }}
          cache-to: type=inline
          provenance: false

      # ---- Summary ----
      - name: Job summary
        if: always()
        run: |
          echo "## ${{ matrix.image.name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Strategy:** \`${{ steps.strategy.outputs.final }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Image:** \`${{ steps.meta.outputs.prod_image_ref }}\`" >> "$GITHUB_STEP_SUMMARY"

  # ============================================================================
  # Job 2: Update Kustomization + config.env
  # ============================================================================
  update-kustomization:
    name: Update Kustomization (${{ github.ref_name }})
    needs: [detect, release]
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GH_TOKEN }}
          ref: main
          fetch-depth: 0

      - name: Update kustomization.yaml
        run: |
          OVERLAY_DIR="${{ inputs.overlay_path }}"
          KUSTOMIZATION_FILE="${OVERLAY_DIR}/kustomization.yaml"

          if [ ! -f "$KUSTOMIZATION_FILE" ]; then
            echo "::warning::${KUSTOMIZATION_FILE} not found. Skipping."
            exit 0
          fi

          RELEASE_TAG="${{ github.ref_name }}"
          REGISTRY="${{ inputs.registry }}"
          PROJECT="${{ inputs.gcp_project_id }}"
          REPO="${{ inputs.repository }}"

          echo "Updating images in ${KUSTOMIZATION_FILE}:"
          echo '${{ inputs.kustomize_images }}' | jq -c '.[]' | while IFS= read -r img; do
            KUSTOMIZE_NAME=$(echo "$img" | jq -r '.kustomize_name')
            IMAGE_NAME=$(echo "$img" | jq -r '.image_name')
            NEW_NAME="${REGISTRY}/${PROJECT}/${REPO}/${IMAGE_NAME}"

            echo "  ${KUSTOMIZE_NAME} -> ${NEW_NAME}:${RELEASE_TAG}"

            sed -i "/name: ${KUSTOMIZE_NAME}/,/newTag:/ s|newTag:.*|newTag: ${RELEASE_TAG}|" "$KUSTOMIZATION_FILE"
            sed -i "/name: ${KUSTOMIZE_NAME}/,/newName:/ s|newName:.*|newName: ${NEW_NAME}|" "$KUSTOMIZATION_FILE"
          done

      - name: Update APPLICATION_VERSION in config.env
        run: |
          OVERLAY_DIR="${{ inputs.overlay_path }}"
          CONFIG_FILE="${OVERLAY_DIR}/${{ inputs.config_env_file }}"
          RELEASE_TAG="${{ github.ref_name }}"

          if [ ! -f "$CONFIG_FILE" ]; then
            echo "::warning::${CONFIG_FILE} not found. Skipping."
            exit 0
          fi

          # Ensure file ends with a newline before modifying
          [ -s "$CONFIG_FILE" ] && [ "$(tail -c1 "$CONFIG_FILE")" != "" ] && echo "" >> "$CONFIG_FILE"

          if grep -q '^APPLICATION_VERSION=' "$CONFIG_FILE"; then
            sed -i "s|^APPLICATION_VERSION=.*|APPLICATION_VERSION=${RELEASE_TAG}|" "$CONFIG_FILE"
            echo "Updated APPLICATION_VERSION in ${CONFIG_FILE}"
          else
            echo "APPLICATION_VERSION=${RELEASE_TAG}" >> "$CONFIG_FILE"
            echo "Added APPLICATION_VERSION to ${CONFIG_FILE}"
          fi

      - name: Commit and push changes
        run: |
          OVERLAY_DIR="${{ inputs.overlay_path }}"
          RELEASE_TAG="${{ github.ref_name }}"
          PREFIX="${{ inputs.commit_message_prefix }}"
          STRATEGY="${{ needs.detect.outputs.strategy }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "${OVERLAY_DIR}/kustomization.yaml" "${OVERLAY_DIR}/${{ inputs.config_env_file }}"

          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          if [ -n "$PREFIX" ]; then
            COMMIT_MSG="[skip ci] ${STRATEGY} ${PREFIX} ${RELEASE_TAG} in ${OVERLAY_DIR}"
          else
            COMMIT_MSG="[skip ci] ${STRATEGY} ${RELEASE_TAG} in ${OVERLAY_DIR}"
          fi

          git commit -m "$COMMIT_MSG"
          git push origin main

          echo "## Release Deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Release:** \`${RELEASE_TAG}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Strategy:** \`${STRATEGY}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Overlay:** \`${OVERLAY_DIR}\`" >> "$GITHUB_STEP_SUMMARY"

  # ============================================================================
  # Job 4: Slack Notification
  # ============================================================================
  notify:
    name: Slack Notification
    needs: [detect, release, update-kustomization]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Send Slack notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "No Slack webhook configured, skipping"
            exit 0
          fi

          RELEASE_RESULT="${{ needs.release.result }}"
          KUSTOMIZE_RESULT="${{ needs.update-kustomization.result }}"
          STRATEGY="${{ needs.detect.outputs.strategy }}"

          if [ "$RELEASE_RESULT" = "success" ] && ([ "$KUSTOMIZE_RESULT" = "success" ] || [ "$KUSTOMIZE_RESULT" = "skipped" ]); then
            COLOR="#36a64f"
            STATUS="Released"
            if [ "$STRATEGY" = "promote" ]; then
              EMOJI=":rocket:"
              METHOD="promoted from dev"
            else
              EMOJI=":white_check_mark:"
              METHOD="rebuilt (hotfix)"
            fi
          else
            COLOR="#dc3545"
            STATUS="Failed"
            EMOJI=":x:"
            METHOD="${STRATEGY}"
          fi

          PREFIX="${{ inputs.commit_message_prefix }}"
          IMAGES_LABEL="${PREFIX:-multi-image}"

          curl -sf "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "$(jq -n \
              --arg color "$COLOR" \
              --arg status "$STATUS" \
              --arg emoji "$EMOJI" \
              --arg method "$METHOD" \
              --arg repo "${{ github.repository }}" \
              --arg images "$IMAGES_LABEL" \
              --arg tag "${{ github.ref_name }}" \
              --arg url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              --arg actor "${{ github.actor }}" \
              '{
                "attachments": [{
                  "color": $color,
                  "blocks": [
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": ($emoji + " *" + $status + "* | `" + $repo + "`")
                      }
                    },
                    {
                      "type": "section",
                      "fields": [
                        {"type": "mrkdwn", "text": ("*Images:*\n`" + $images + "`")},
                        {"type": "mrkdwn", "text": ("*Release:*\n`" + $tag + "`")},
                        {"type": "mrkdwn", "text": ("*Strategy:*\n" + $method)},
                        {"type": "mrkdwn", "text": ("*Workflow:*\n<" + $url + "|View Run>")}
                      ]
                    }
                  ]
                }]
              }'
            )" || echo "::warning::Slack notification failed"
