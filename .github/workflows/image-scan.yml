# ==============================================================================
# Reusable Workflow: Container Image Vulnerability Scan (Trivy)
# ==============================================================================
# Pulls a Docker image from GCP Artifact Registry and scans its layers with
# Trivy for OS package and application dependency CVEs only (not secrets).
# Secret scanning is intentionally excluded: third-party packages often ship
# test fixtures with masked placeholder tokens that Trivy misclassifies.
# Use sast.yml / gitleaks for repository secret detection instead.
#
# Scan behavior is controlled by policy flags:
#   - `block_vulnerability_findings: true` blocks on matching fixable CVEs.
#   - `accept_vulnerability_risk_with_warnings: true` logs findings but does
#     not block when the repo documents accepted risk in `.trivyignore`.
#
# Findings are always printed as a table in the job log. When
# `block_vulnerability_findings: true`, that table scan is the blocking gate.
# When `upload_sarif: true` (default) the SARIF report is also saved as a
# downloadable workflow artifact — we don't have GitHub Advanced Security, so it
# can't go to the Security tab. The artifact uses short retention to keep storage
# negligible.
#
# A `.trivyignore` file at the repo root is auto-detected and used to suppress
# accepted false-positives (same convention as sast.yml).
#
# Usage (direct call from a top-level workflow):
#   jobs:
#     scan:
#       uses: NeuralTrust/workflows/.github/workflows/image-scan.yml@main
#       permissions:
#         contents: read
#         id-token: write          # GCP WIF auth to pull the image
#       with:
#         image_ref: europe-west1-docker.pkg.dev/proj/repo/svc:sha-123abc
#         block_vulnerability_findings: true
#         # or, for documented risk acceptance:
#         # accept_vulnerability_risk_with_warnings: true
#       secrets: inherit
#
# (No security-events / actions scopes are needed — the report is an artifact,
# not a Security-tab upload. Set `upload_sarif: false` to skip saving it.)
# ==============================================================================

name: Image Vulnerability Scan

on:
  workflow_call:
    inputs:
      image_ref:
        description: >
          Full image reference to scan, including registry, project, repo and tag
          (e.g. europe-west1-docker.pkg.dev/my-proj/nt-docker/my-svc:abc123).
        required: true
        type: string
      severity:
        description: 'Trivy severity levels to scan (comma-separated)'
        required: false
        type: string
        default: 'CRITICAL,HIGH'
      block_vulnerability_findings:
        description: >
          When true, matching vulnerabilities fail the job. This is the preferred
          policy flag for blocking gates such as production promotion.
        required: false
        type: boolean
        default: false
      exit_code:
        description: >
          Legacy escape hatch: exit code when matching vulnerabilities are found.
          "0" = warn (never blocks), "1" = block (fails the job).
          Prefer block_vulnerability_findings or
          accept_vulnerability_risk_with_warnings for new callers.
        required: false
        type: string
        default: '0'
      accept_vulnerability_risk_with_warnings:
        description: >
          Accepted risk mode. When true, Trivy findings are logged and uploaded
          as artifacts, but do not block the workflow. Accepted CVEs should be
          documented in the repo root .trivyignore with a revisit date.
        required: false
        type: boolean
        default: false
      ignore_unfixed:
        description: >
          When true, only count vulnerabilities that have a fix available
          (matches the "fixable only" gate used for prod promotes).
        required: false
        type: boolean
        default: true
      scanners:
        description: >
          Comma-separated Trivy scanners for image scans. Default is `vuln`
          only so prod gates block on fixable CVEs, not secret false positives
          in dependency test data. Use `vuln,secret` only when you explicitly
          need image-layer secret detection.
        required: false
        type: string
        default: 'vuln'
      trivyignore_path:
        description: >
          Path to a Trivy ignore file (.trivyignore) for suppressing
          false positives. Auto-detected from repo root if present.
        required: false
        type: string
        default: ''
      upload_sarif:
        description: >
          Save Trivy SARIF results as a downloadable workflow artifact. (Name kept
          for backward compatibility; results are no longer pushed to the GitHub
          Security tab since that requires GitHub Advanced Security.)
        required: false
        type: boolean
        default: true
      registry:
        description: 'Artifact Registry host used for docker login'
        required: false
        type: string
        default: 'europe-west1-docker.pkg.dev'
      runner:
        description: 'GitHub Actions runner label'
        required: false
        type: string
        default: 'ubuntu-latest'
    secrets:
      WIF_PROVIDER:
        required: true
        description: 'GCP Workload Identity Federation provider'
      WIF_SERVICE_ACCOUNT:
        required: true
        description: 'GCP service account email for WIF authentication'

jobs:
  scan:
    name: Trivy Image Scan
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Detect Trivy ignore file
        id: trivyignore
        run: |
          if [ -n "${{ inputs.trivyignore_path }}" ]; then
            echo "path=${{ inputs.trivyignore_path }}" >> "$GITHUB_OUTPUT"
          elif [ -f ".trivyignore" ]; then
            echo "path=.trivyignore" >> "$GITHUB_OUTPUT"
          else
            echo "path=" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Login to Artifact Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ inputs.registry }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Resolve scan policy
        id: scan_policy
        run: |
          if [ "${{ inputs.accept_vulnerability_risk_with_warnings }}" = "true" ]; then
            echo "exit_code=0" >> "$GITHUB_OUTPUT"
            echo "mode=accepted risk with warnings" >> "$GITHUB_OUTPUT"
          elif [ "${{ inputs.block_vulnerability_findings }}" = "true" ] || [ "${{ inputs.exit_code }}" = "1" ]; then
            echo "exit_code=1" >> "$GITHUB_OUTPUT"
            echo "mode=block" >> "$GITHUB_OUTPUT"
          else
            echo "exit_code=0" >> "$GITHUB_OUTPUT"
            echo "mode=warn" >> "$GITHUB_OUTPUT"
          fi

      # Human-readable scan — ALWAYS runs, so findings are visible in the job log.
      # With block_vulnerability_findings, this is the blocking gate. In
      # accepted-risk mode, it reports findings as warnings so an explicit risk
      # decision can move forward.
      - name: Run Trivy image scan (table)
        id: trivy_table
        # SHA-pinned to the only post-incident-safe release (Mar 2026 supply-chain
        # compromise, CVE-2026-33634): tags 0.0.1–0.34.2 were force-pushed to
        # malicious commits. Pin trivy itself to a release whose artifacts still
        # exist — the action's old default (v0.65.0) was deleted and now 404s.
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          version: 'v0.71.0'
          scan-type: 'image'
          image-ref: ${{ inputs.image_ref }}
          scanners: ${{ inputs.scanners }}
          severity: ${{ inputs.severity }}
          format: 'table'
          exit-code: ${{ steps.scan_policy.outputs.exit_code }}
          ignore-unfixed: ${{ inputs.ignore_unfixed }}
          vuln-type: 'os,library'
          trivyignores: ${{ steps.trivyignore.outputs.path }}

      # SARIF generation for the downloadable report artifact. exit-code is forced
      # to 0 (the gate is the table step above) and this runs even if that gate
      # failed (always()) so the report is still produced.
      - name: Run Trivy image scan (SARIF)
        if: always() && inputs.upload_sarif
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          version: 'v0.71.0'
          scan-type: 'image'
          image-ref: ${{ inputs.image_ref }}
          scanners: ${{ inputs.scanners }}
          severity: ${{ inputs.severity }}
          format: 'sarif'
          output: 'trivy-image.sarif'
          exit-code: '0'
          ignore-unfixed: ${{ inputs.ignore_unfixed }}
          vuln-type: 'os,library'
          trivyignores: ${{ steps.trivyignore.outputs.path }}

      - name: Save SARIF report as artifact
        # No GitHub Advanced Security, so SARIF can't go to the Security tab. Save it
        # as a downloadable artifact instead (no GHAS / extra scopes needed). Short
        # retention keeps storage negligible. Findings are also in the table log.
        if: always() && inputs.upload_sarif && hashFiles('trivy-image.sarif') != ''
        uses: actions/upload-artifact@v7
        with:
          name: trivy-image-sarif
          path: 'trivy-image.sarif'
          retention-days: 7

      - name: Summary
        if: always()
        run: |
          {
            echo "## Trivy Image Scan"
            echo ""
            echo "- **Image:** \`${{ inputs.image_ref }}\`"
            echo "- **Severity:** \`${{ inputs.severity }}\`"
            echo "- **Scanners:** \`${{ inputs.scanners }}\`"
            echo "- **Fixable only:** \`${{ inputs.ignore_unfixed }}\`"
            echo "- **Mode:** \`${{ steps.scan_policy.outputs.mode }}\`"
            echo "- **Block vulnerability findings:** \`${{ inputs.block_vulnerability_findings }}\`"
            echo "- **Accepted vulnerability risk:** \`${{ inputs.accept_vulnerability_risk_with_warnings }}\`"
            if [ -n "${{ steps.trivyignore.outputs.path }}" ]; then
              echo "- **Ignore file:** \`${{ steps.trivyignore.outputs.path }}\`"
            fi
            echo ""
            echo "Full findings are in the scan logs above; the SARIF report is saved as the \`trivy-image-sarif\` run artifact."
          } >> "$GITHUB_STEP_SUMMARY"
