# ==============================================================================
# Reusable Workflow: Build and Push Docker Image to GCP Artifact Registry
# ==============================================================================
# Builds a Docker image with BuildKit caching and pushes to Artifact Registry.
# Supports: custom Dockerfile, build targets, build args, tag prefix/suffix,
#           semver tagging on git tags, and registry-based layer caching.
#
# Usage:
#   jobs:
#     build:
#       uses: NeuralTrust/workflows/.github/workflows/build-push-image.yml@main
#       with:
#         image_name: my-service
#         gcp_project_id: my-gcp-project
#       secrets:
#         WIF_PROVIDER: ${{ secrets.WIF_PROVIDER }}
#         WIF_SERVICE_ACCOUNT: ${{ secrets.WIF_SERVICE_ACCOUNT }}
# ==============================================================================

name: Build and Push Docker Image

on:
  workflow_call:
    inputs:
      image_name:
        description: 'Docker image name in the registry (e.g., "tenant-app", "aiapi")'
        required: true
        type: string
      gcp_project_id:
        description: 'GCP Project ID that owns the Artifact Registry'
        required: true
        type: string
      registry:
        description: 'Artifact Registry host'
        required: false
        type: string
        default: 'europe-west1-docker.pkg.dev'
      repository:
        description: 'Artifact Registry repository name'
        required: false
        type: string
        default: 'nt-docker'
      dockerfile:
        description: 'Path to Dockerfile relative to context (e.g., "Dockerfile", "dockerfiles/gpu/Dockerfile")'
        required: false
        type: string
        default: 'Dockerfile'
      context:
        description: 'Docker build context path'
        required: false
        type: string
        default: '.'
      build_target:
        description: 'Docker build target for multi-stage builds (e.g., "api", "worker")'
        required: false
        type: string
        default: ''
      build_args:
        description: 'Newline-separated build args (KEY=VALUE). APP_VERSION is auto-added.'
        required: false
        type: string
        default: ''
      tag_prefix:
        description: 'Prefix for all image tags (e.g., "gpu-")'
        required: false
        type: string
        default: ''
      tag_suffix:
        description: 'Suffix for all image tags (e.g., "-with-models")'
        required: false
        type: string
        default: ''
      extra_tags:
        description: 'Comma-separated extra tags pushed with the image (e.g., develop, staging)'
        required: false
        type: string
        default: ''
      runner:
        description: 'GitHub Actions runner label'
        required: false
        type: string
        default: 'ubuntu-latest'
    secrets:
      WIF_PROVIDER:
        required: true
        description: 'GCP Workload Identity Federation provider'
      WIF_SERVICE_ACCOUNT:
        required: true
        description: 'GCP service account email for WIF authentication'
      BUILD_SECRETS:
        required: false
        description: 'Newline-separated secret build args (KEY=VALUE)'
      DOCKER_SECRETS:
        required: false
        description: 'Newline-separated Docker build secrets (e.g. for mount-type secrets in Dockerfile)'
    outputs:
      image_ref:
        description: 'Full image reference with commit SHA tag'
        value: ${{ jobs.build-push.outputs.image_ref }}
      image_tag:
        description: 'Image tag (prefix + commit SHA + suffix)'
        value: ${{ jobs.build-push.outputs.image_tag }}

jobs:
  build-push:
    name: Build & Push ${{ inputs.image_name }}
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 60

    outputs:
      image_ref: ${{ steps.build.outputs.image_ref }}
      image_tag: ${{ steps.build.outputs.image_tag }}

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Build and push Docker image
        id: build
        uses: NeuralTrust/workflows/.github/actions/docker-build-push@main
        with:
          image_name: ${{ inputs.image_name }}
          gcp_project_id: ${{ inputs.gcp_project_id }}
          registry: ${{ inputs.registry }}
          repository: ${{ inputs.repository }}
          dockerfile: ${{ inputs.dockerfile }}
          context: ${{ inputs.context }}
          build_target: ${{ inputs.build_target }}
          build_args: ${{ inputs.build_args }}
          build_secrets: ${{ secrets.BUILD_SECRETS }}
          docker_secrets: ${{ secrets.DOCKER_SECRETS }}
          access_token: ${{ steps.auth.outputs.access_token }}
          app_version: ${{ github.ref_type == 'tag' && github.ref_name || github.sha }}
          tag_prefix: ${{ inputs.tag_prefix }}
          tag_suffix: ${{ inputs.tag_suffix }}
          extra_tags: ${{ inputs.extra_tags }}
          include_git_tag: 'true'

      - name: Summary
        run: |
          {
            echo "## Docker Image Built & Pushed"
            echo ""
            echo "- **Image:** \`${{ steps.build.outputs.image_ref }}\`"
            echo "- **Latest:** \`${{ steps.build.outputs.latest_ref }}\`"
            if [[ "${{ steps.build.outputs.has_git_tag }}" == "true" ]]; then
              echo "- **Semver:** \`${{ github.ref_name }}\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
