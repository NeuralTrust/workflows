# Reusable workflow for auto-approving PRs
# This workflow is called by other repositories to approve PRs when CI passes
# Only approves when ALL required checks have passed

name: Auto Approve PR

on:
  workflow_call:
    inputs:
      approve_message:
        description: 'Message to include in the approval'
        required: false
        type: string
        default: 'LGTM!'
      timeout_minutes:
        description: 'Timeout in minutes to wait for all checks'
        required: false
        type: number
        default: 15
      poll_interval:
        description: 'Seconds between status checks'
        required: false
        type: number
        default: 30
    secrets:
      GH_TOKEN:
        required: true
        description: 'GitHub token with repo permissions for approving PRs'

jobs:
  auto-approve:
    name: Auto Approve
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    permissions:
      contents: read
      pull-requests: write
      checks: read
    
    steps:
      - name: Wait for CI checks
        id: wait
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.event.pull_request.head.sha }}
          TIMEOUT_MINUTES: ${{ inputs.timeout_minutes }}
          POLL_INTERVAL: ${{ inputs.poll_interval }}
        run: |
          echo "⏳ Waiting for CI checks to complete..."
          
          TIMEOUT=$((TIMEOUT_MINUTES * 60))
          ELAPSED=0
          
          while [ $ELAPSED -lt $TIMEOUT ]; do
            # Get check runs using the API
            CHECKS=$(gh api repos/$REPO/commits/$SHA/check-runs --jq '.check_runs' 2>/dev/null || echo "[]")
            
            if [ "$CHECKS" = "[]" ] || [ -z "$CHECKS" ]; then
              echo "No checks found yet, waiting..."
              sleep $POLL_INTERVAL
              ELAPSED=$((ELAPSED + POLL_INTERVAL))
              continue
            fi
            
            # Filter out our own workflows and count by status
            PENDING=$(echo "$CHECKS" | jq '[.[] | select(.name | test("Auto Approve|AI Code Review|PR Automation") | not) | select(.status != "completed")] | length')
            FAILED=$(echo "$CHECKS" | jq '[.[] | select(.name | test("Auto Approve|AI Code Review|PR Automation") | not) | select(.status == "completed" and .conclusion == "failure")] | length')
            SUCCESS=$(echo "$CHECKS" | jq '[.[] | select(.name | test("Auto Approve|AI Code Review|PR Automation") | not) | select(.status == "completed" and .conclusion == "success")] | length')
            TOTAL=$(echo "$CHECKS" | jq '[.[] | select(.name | test("Auto Approve|AI Code Review|PR Automation") | not)] | length')
            
            echo "Status: $TOTAL checks ($SUCCESS passed, $PENDING pending, $FAILED failed) - elapsed: ${ELAPSED}s"
            
            # If any check failed, exit without approving
            if [ "$FAILED" -gt 0 ]; then
              echo "❌ Some checks failed. Not approving."
              echo "result=failed" >> $GITHUB_OUTPUT
              exit 0
            fi
            
            # If all checks completed successfully (or no CI checks exist)
            if [ "$PENDING" -eq 0 ]; then
              if [ "$TOTAL" -gt 0 ]; then
                echo "✅ All $TOTAL CI checks passed!"
              else
                echo "✅ No CI checks to wait for."
              fi
              echo "result=success" >> $GITHUB_OUTPUT
              exit 0
            fi
            
            sleep $POLL_INTERVAL
            ELAPSED=$((ELAPSED + POLL_INTERVAL))
          done
          
          echo "⏰ Timeout reached."
          echo "result=timeout" >> $GITHUB_OUTPUT

      - name: Approve PR
        if: steps.wait.outputs.result == 'success'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          APPROVE_MESSAGE: ${{ inputs.approve_message }}
        run: |
          gh pr review $PR_NUMBER --repo $REPO --approve --body "$APPROVE_MESSAGE"
          echo "✅ PR approved!"
