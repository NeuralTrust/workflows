# ==============================================================================
# Workflows CI — the "CI of CIs"
# ==============================================================================
# Every other NeuralTrust repo consumes the reusable workflows and composite
# actions in this repo, so a mistake here breaks pipelines org-wide. This
# workflow lints and security-audits this repo's own Actions surface on every
# change to .github/.
#
#   - actionlint: syntax, shellcheck on run: blocks, expression/type checks
#                 (BLOCKING — a broken workflow must never reach main)
#   - hygiene:    reusable-workflow rules that lints can't express — most
#                 importantly, reusable workflows must reference composite
#                 actions by full repo ref, never by local ./ path (BLOCKING).
#   - zizmor:     GitHub Actions security static analysis (INFORMATIONAL). Findings
#                 print to the log and the SARIF is saved as a run artifact (we have
#                 no GitHub Advanced Security, so the Security tab isn't available).
#                 The unpinned-uses audit is relaxed to "ref-pin" via
#                 .github/zizmor.yml since the repo pins to release tags and
#                 lets Dependabot bump them. Flip the gate step below to blocking
#                 once the pre-existing template-injection findings are cleared.
# ==============================================================================

name: Workflows CI

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"
      - ".github/zizmor.yml"
  pull_request:
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"
      - ".github/zizmor.yml"
  workflow_dispatch:

# Least privilege by default; jobs opt into more where required.
permissions:
  contents: read

concurrency:
  group: workflows-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Run actionlint
        run: |
          set -euo pipefail
          docker run --rm \
            -v "${PWD}:/repo" --workdir /repo \
            rhysd/actionlint:1.7.12 -color

  reusable-hygiene:
    name: reusable-workflow hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      # A reusable workflow runs in the CALLER's checkout, so `uses: ./...`
      # resolves against the consumer repo, not this one. Composite actions
      # must therefore be referenced by full repo ref. This is the exact bug
      # that broke consumer deploys; catch it before it reaches main.
      - name: Reusable workflows must not reference local action paths
        run: |
          set -euo pipefail
          bad=0
          for f in .github/workflows/*.yml .github/workflows/*.yaml; do
            [ -e "$f" ] || continue
            if grep -q 'workflow_call:' "$f" && grep -nE 'uses:[[:space:]]*\./\.github/actions/' "$f"; then
              echo "::error file=${f}::Reusable workflow references a local action path (./.github/actions/...). Use NeuralTrust/workflows/.github/actions/<name>@main — local paths resolve against the caller repo and break consumers."
              bad=1
            fi
          done
          if [ "$bad" -eq 0 ]; then
            echo "OK: no reusable workflow references local action paths."
          fi
          exit "$bad"

  zizmor:
    name: zizmor (Actions security)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      # Informational: never fails the job. zizmor also prints findings to the log;
      # the SARIF below is saved as an artifact for later inspection.
      - name: Run zizmor (SARIF, informational)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uvx zizmor@1.25.2 \
            --config .github/zizmor.yml \
            --format sarif --output zizmor.sarif .

      # We don't have GitHub Advanced Security, so SARIF can't go to the Security
      # tab. Save it as a downloadable artifact instead. Short retention.
      - name: Save zizmor SARIF report as artifact
        if: always() && hashFiles('zizmor.sarif') != ''
        uses: actions/upload-artifact@v7
        with:
          name: zizmor-sarif
          path: zizmor.sarif
          retention-days: 7
