# ==============================================================================
# Reusable Workflow: Docker Build + Deploy (All-in-One)
# ==============================================================================
# Convenience composite that builds a single Docker image, pushes it to
# GCP Artifact Registry, and updates kustomization.yaml in a single call.
#
# For MOST services, this is the only workflow you need to call.
# For multi-image services (e.g., multi-target Dockerfiles or separate
# backend/frontend), use build-push-image.yml + update-kustomization.yml
# separately.
#
# Usage:
#   jobs:
#     deploy:
#       uses: NeuralTrust/workflows/.github/workflows/docker-build-deploy.yml@main
#       with:
#         image_name: my-service
#         gcp_project_id: my-gcp-project
#       secrets: inherit
# ==============================================================================

name: Docker Build & Deploy

on:
  workflow_call:
    inputs:
      # ---- Build inputs ----
      image_name:
        description: 'Docker image name in the registry'
        required: true
        type: string
      gcp_project_id:
        description: 'GCP Project ID that owns the Artifact Registry'
        required: true
        type: string
      registry:
        description: 'Artifact Registry host'
        required: false
        type: string
        default: 'europe-west1-docker.pkg.dev'
      repository:
        description: 'Artifact Registry repository name'
        required: false
        type: string
        default: 'nt-docker'
      dockerfile:
        description: 'Path to Dockerfile relative to context'
        required: false
        type: string
        default: 'Dockerfile'
      context:
        description: 'Docker build context path'
        required: false
        type: string
        default: '.'
      build_target:
        description: 'Docker build target for multi-stage builds'
        required: false
        type: string
        default: ''
      build_args:
        description: 'Newline-separated non-secret build args (KEY=VALUE)'
        required: false
        type: string
        default: ''
      tag_prefix:
        description: 'Prefix for all image tags (e.g., "gpu-")'
        required: false
        type: string
        default: ''
      tag_suffix:
        description: 'Suffix for all image tags (e.g., "-with-models")'
        required: false
        type: string
        default: ''
      # ---- Kustomization inputs ----
      kustomize_name:
        description: 'Image name in kustomization.yaml (defaults to image_name)'
        required: false
        type: string
        default: ''
      overlay_dev_path:
        description: 'Path to dev kustomize overlay'
        required: false
        type: string
        default: 'k8s/overlays/dev'
      overlay_prod_path:
        description: 'Path to prod kustomize overlay'
        required: false
        type: string
        default: 'k8s/overlays/prod'
      free_disk_space:
        description: 'Free disk space before build (needed for large images like pytorch/cuda)'
        required: false
        type: boolean
        default: false
      runner:
        description: 'GitHub Actions runner label'
        required: false
        type: string
        default: 'ubuntu-latest'
    secrets:
      WIF_PROVIDER:
        required: true
        description: 'GCP Workload Identity Federation provider'
      WIF_SERVICE_ACCOUNT:
        required: true
        description: 'GCP service account email for WIF'
      BUILD_SECRETS:
        required: false
        description: 'Newline-separated secret build args (KEY=VALUE)'
      GH_TOKEN:
        required: true
        description: 'GitHub token with push permissions for kustomization updates'
      SLACK_WEBHOOK_URL:
        required: false
        description: 'Slack Incoming Webhook URL for deploy notifications'
      DOCKER_SECRETS:
        required: false
        description: 'Newline-separated Docker build secrets (e.g. for mount-type secrets in Dockerfile)'

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ============================================================================
  # Job 1: Build and Push Docker Image
  # ============================================================================
  build-push:
    name: Build & Push ${{ inputs.image_name }}
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 60

    outputs:
      image_ref: ${{ steps.build.outputs.image_ref }}
      image_tag: ${{ steps.build.outputs.image_tag }}

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Free disk space
        if: inputs.free_disk_space
        uses: NeuralTrust/workflows/.github/actions/free-disk-space@main

      - name: Checkout code
        uses: actions/checkout@v7

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Build and push Docker image
        id: build
        uses: NeuralTrust/workflows/.github/actions/docker-build-push@main
        with:
          image_name: ${{ inputs.image_name }}
          gcp_project_id: ${{ inputs.gcp_project_id }}
          registry: ${{ inputs.registry }}
          repository: ${{ inputs.repository }}
          dockerfile: ${{ inputs.dockerfile }}
          context: ${{ inputs.context }}
          build_target: ${{ inputs.build_target }}
          build_args: ${{ inputs.build_args }}
          build_secrets: ${{ secrets.BUILD_SECRETS }}
          docker_secrets: ${{ secrets.DOCKER_SECRETS }}
          access_token: ${{ steps.auth.outputs.access_token }}
          app_version: ${{ github.sha }}
          tag_prefix: ${{ inputs.tag_prefix }}
          tag_suffix: ${{ inputs.tag_suffix }}

  # ============================================================================
  # Job 2: Image Vulnerability Scan (warn mode — never blocks dev deploys)
  # ============================================================================
  scan:
    name: Image Vulnerability Scan
    needs: build-push
    uses: ./.github/workflows/image-scan.yml
    permissions:
      contents: read
      id-token: write
    with:
      image_ref: ${{ needs.build-push.outputs.image_ref }}
      exit_code: '0'
      upload_sarif: false
    secrets:
      WIF_PROVIDER: ${{ secrets.WIF_PROVIDER }}
      WIF_SERVICE_ACCOUNT: ${{ secrets.WIF_SERVICE_ACCOUNT }}

  # ============================================================================
  # Job 3: Update Kustomization (only on develop/main branch pushes)
  # ============================================================================
  update-kustomization:
    name: Update Kustomization
    needs: build-push
    runs-on: ubuntu-latest
    if: github.ref_type == 'branch' && (github.ref_name == 'develop' || github.ref_name == 'main')
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GH_TOKEN }}
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Determine overlay directory
        id: overlay
        run: |
          case "${{ github.ref_name }}" in
            develop)
              echo "dir=${{ inputs.overlay_dev_path }}" >> "$GITHUB_OUTPUT"
              ;;
            main)
              echo "dir=${{ inputs.overlay_prod_path }}" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Update kustomization.yaml
        uses: NeuralTrust/workflows/.github/actions/kustomize-set-images@main
        with:
          overlay_dir: ${{ steps.overlay.outputs.dir }}
          images: |
            [{"kustomize_name":"${{ inputs.kustomize_name || inputs.image_name }}","image_name":"${{ inputs.image_name }}"}]
          image_tag: ${{ needs.build-push.outputs.image_tag }}
          registry: ${{ inputs.registry }}
          gcp_project_id: ${{ inputs.gcp_project_id }}
          repository: ${{ inputs.repository }}

      - name: Update APPLICATION_VERSION in config.env
        run: |
          OVERLAY_DIR="${{ steps.overlay.outputs.dir }}"
          CONFIG_FILE="${OVERLAY_DIR}/config.env"
          IMAGE_TAG="${{ needs.build-push.outputs.image_tag }}"

          if [ ! -f "$CONFIG_FILE" ]; then
            echo "::warning::${CONFIG_FILE} not found. Skipping APPLICATION_VERSION update."
            exit 0
          fi

          # Ensure file ends with a newline before modifying
          [ -s "$CONFIG_FILE" ] && [ "$(tail -c1 "$CONFIG_FILE")" != "" ] && echo "" >> "$CONFIG_FILE"

          if grep -q '^APPLICATION_VERSION=' "$CONFIG_FILE"; then
            sed -i "s|^APPLICATION_VERSION=.*|APPLICATION_VERSION=${IMAGE_TAG}|" "$CONFIG_FILE"
          else
            echo "APPLICATION_VERSION=${IMAGE_TAG}" >> "$CONFIG_FILE"
          fi

      - name: Commit and push changes
        uses: NeuralTrust/workflows/.github/actions/git-commit-push@main
        with:
          branch: ${{ github.ref_name }}
          message: update ${{ inputs.image_name }} image tag to ${{ needs.build-push.outputs.image_tag }} in ${{ steps.overlay.outputs.dir }}
          paths: |
            ${{ steps.overlay.outputs.dir }}/kustomization.yaml
            ${{ steps.overlay.outputs.dir }}/config.env

      - name: Deployment summary
        run: |
          OVERLAY_DIR="${{ steps.overlay.outputs.dir }}"

          {
            echo "## Deployment Updated"
            echo "- **Image:** \`${{ needs.build-push.outputs.image_ref }}\`"
            echo "- **Overlay:** \`${OVERLAY_DIR}\`"
            echo "- **Branch:** \`${{ github.ref_name }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  # ============================================================================
  # Job 3: Slack Notification
  # ============================================================================
  notify:
    name: Slack Notification
    needs: [build-push, update-kustomization]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Send Slack notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "No Slack webhook configured, skipping"
            exit 0
          fi

          BUILD="${{ needs.build-push.result }}"
          KUSTOMIZE="${{ needs.update-kustomization.result }}"

          if [ "$BUILD" = "success" ] && { [ "$KUSTOMIZE" = "success" ] || [ "$KUSTOMIZE" = "skipped" ]; }; then
            COLOR="#36a64f"
            STATUS="Deployed"
            EMOJI=":white_check_mark:"
          else
            COLOR="#dc3545"
            STATUS="Failed"
            EMOJI=":x:"
          fi

          curl -sf "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "$(jq -n \
              --arg color "$COLOR" \
              --arg status "$STATUS" \
              --arg emoji "$EMOJI" \
              --arg repo "${{ github.repository }}" \
              --arg image "${{ inputs.image_name }}" \
              --arg tag "${{ needs.build-push.outputs.image_tag }}" \
              --arg branch "${{ github.ref_name }}" \
              --arg url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              --arg actor "${{ github.actor }}" \
              '{
                "attachments": [{
                  "color": $color,
                  "blocks": [
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": ($emoji + " *" + $status + "* | `" + $repo + "`")
                      }
                    },
                    {
                      "type": "section",
                      "fields": [
                        {"type": "mrkdwn", "text": ("*Image:*\n`" + $image + ":" + $tag + "`")},
                        {"type": "mrkdwn", "text": ("*Branch:*\n`" + $branch + "`")},
                        {"type": "mrkdwn", "text": ("*Actor:*\n" + $actor)},
                        {"type": "mrkdwn", "text": ("*Workflow:*\n<" + $url + "|View Run>")}
                      ]
                    }
                  ]
                }]
              }'
            )" || echo "::warning::Slack notification failed"
