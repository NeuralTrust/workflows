# ==============================================================================
# Reusable Workflow: Multi-Image Build & Deploy
# ==============================================================================
# Builds multiple Docker images in parallel using a matrix strategy, then
# updates kustomization.yaml with COMMIT_SHA tags.
#
# Use this for services that produce multiple images (multi-target Dockerfiles,
# separate backend/frontend, image variants, etc.).
#
# The `images` input is a JSON array where each object configures one build:
#   - name (required): Docker image name in the registry
#   - target:          Docker build target for multi-stage builds
#   - context:         Docker build context path (default: '.')
#   - dockerfile:      Dockerfile path relative to context (default: 'Dockerfile')
#   - build_args:      Extra build args (newline-separated KEY=VALUE)
#   - tag_prefix:      Prefix for image tags (e.g., 'gpu-')
#   - tag_suffix:      Suffix for image tags (e.g., '-with-models')
#
# Usage:
#   jobs:
#     deploy:
#       uses: NeuralTrust/workflows/.github/workflows/multi-image-deploy.yml@main
#       with:
#         images: '[{"name":"api","target":"api"},{"name":"worker","target":"worker"}]'
#         kustomize_images: '[{"kustomize_name":"api","image_name":"api"},{"kustomize_name":"worker","image_name":"worker"}]'
#         gcp_project_id: ${{ vars.GCP_PROJECT_ID }}
#       secrets: inherit
# ==============================================================================

name: Multi-Image Build & Deploy

on:
  workflow_call:
    inputs:
      images:
        description: 'JSON array of image build configs (see header for schema)'
        required: true
        type: string
      kustomize_images:
        description: 'JSON array for kustomization: [{"kustomize_name":"X","image_name":"Y"}]'
        required: true
        type: string
      gcp_project_id:
        description: 'GCP Project ID that owns the Artifact Registry'
        required: true
        type: string
      registry:
        description: 'Artifact Registry host'
        required: false
        type: string
        default: 'europe-west1-docker.pkg.dev'
      repository:
        description: 'Artifact Registry repository name'
        required: false
        type: string
        default: 'nt-docker'
      overlay_dev_path:
        description: 'Path to dev kustomize overlay'
        required: false
        type: string
        default: 'k8s/overlays/dev'
      overlay_prod_path:
        description: 'Path to prod kustomize overlay'
        required: false
        type: string
        default: 'k8s/overlays/prod'
      commit_message_prefix:
        description: 'Prefix for the kustomization commit message'
        required: false
        type: string
        default: ''
      free_disk_space:
        description: 'Free disk space before build (needed for large images like pytorch/cuda)'
        required: false
        type: boolean
        default: false
      runner:
        description: 'GitHub Actions runner label'
        required: false
        type: string
        default: 'ubuntu-latest'
    secrets:
      WIF_PROVIDER:
        required: true
      WIF_SERVICE_ACCOUNT:
        required: true
      BUILD_SECRETS:
        required: false
      GH_TOKEN:
        required: true
      SLACK_WEBHOOK_URL:
        required: false
        description: 'Slack Incoming Webhook URL for deploy notifications'
      DOCKER_SECRETS:
        required: false
        description: 'Newline-separated Docker build secrets (e.g. for mount-type secrets in Dockerfile)'

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ============================================================================
  # Job 1: Build all images in parallel (matrix)
  # ============================================================================
  build:
    name: Build ${{ matrix.image.name }}
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 60

    strategy:
      matrix:
        image: ${{ fromJson(inputs.images) }}
      fail-fast: false

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Free disk space
        if: inputs.free_disk_space
        uses: NeuralTrust/workflows/.github/actions/free-disk-space@main

      - name: Checkout code
        uses: actions/checkout@v7

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Build and push Docker image
        uses: NeuralTrust/workflows/.github/actions/docker-build-push@main
        with:
          image_name: ${{ matrix.image.name }}
          gcp_project_id: ${{ inputs.gcp_project_id }}
          registry: ${{ inputs.registry }}
          repository: ${{ inputs.repository }}
          context: ${{ matrix.image.context || '.' }}
          dockerfile: ${{ matrix.image.dockerfile || 'Dockerfile' }}
          build_target: ${{ matrix.image.target || '' }}
          build_args: ${{ matrix.image.build_args }}
          build_secrets: ${{ secrets.BUILD_SECRETS }}
          docker_secrets: ${{ secrets.DOCKER_SECRETS }}
          access_token: ${{ steps.auth.outputs.access_token }}
          app_version: ${{ github.sha }}
          tag_prefix: ${{ matrix.image.tag_prefix }}
          tag_suffix: ${{ matrix.image.tag_suffix }}

  # ============================================================================
  # Job 2: Image Vulnerability Scan (warn mode — never blocks dev deploys)
  # ============================================================================
  scan:
    name: Image Vulnerability Scan (${{ matrix.image.name }})
    needs: build
    strategy:
      matrix:
        image: ${{ fromJson(inputs.images) }}
      fail-fast: false
    uses: ./.github/workflows/image-scan.yml
    permissions:
      contents: read
      id-token: write
    with:
      image_ref: '${{ inputs.registry }}/${{ inputs.gcp_project_id }}/${{ inputs.repository }}/${{ matrix.image.name }}:${{ matrix.image.tag_prefix }}${{ github.sha }}${{ matrix.image.tag_suffix }}'
      exit_code: '0'
      upload_sarif: false
    secrets:
      WIF_PROVIDER: ${{ secrets.WIF_PROVIDER }}
      WIF_SERVICE_ACCOUNT: ${{ secrets.WIF_SERVICE_ACCOUNT }}

  # ============================================================================
  # Job 3: Update Kustomization (only on develop/main branch pushes)
  # ============================================================================
  update-kustomization:
    name: Update Kustomization
    needs: build
    runs-on: ubuntu-latest
    if: github.ref_type == 'branch' && (github.ref_name == 'develop' || github.ref_name == 'main')
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GH_TOKEN }}
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Determine overlay directory
        id: overlay
        run: |
          case "${{ github.ref_name }}" in
            develop)
              echo "dir=${{ inputs.overlay_dev_path }}" >> "$GITHUB_OUTPUT"
              ;;
            main)
              echo "dir=${{ inputs.overlay_prod_path }}" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Update kustomization.yaml
        uses: NeuralTrust/workflows/.github/actions/kustomize-set-images@main
        with:
          overlay_dir: ${{ steps.overlay.outputs.dir }}
          images: ${{ inputs.kustomize_images }}
          image_tag: ${{ github.sha }}
          registry: ${{ inputs.registry }}
          gcp_project_id: ${{ inputs.gcp_project_id }}
          repository: ${{ inputs.repository }}

      - name: Update APPLICATION_VERSION in config.env
        run: |
          OVERLAY_DIR="${{ steps.overlay.outputs.dir }}"
          CONFIG_FILE="${OVERLAY_DIR}/config.env"
          IMAGE_TAG="${{ github.sha }}"

          if [ ! -f "$CONFIG_FILE" ]; then
            echo "::warning::${CONFIG_FILE} not found. Skipping APPLICATION_VERSION update."
            exit 0
          fi

          # Ensure file ends with a newline before modifying
          [ -s "$CONFIG_FILE" ] && [ "$(tail -c1 "$CONFIG_FILE")" != "" ] && echo "" >> "$CONFIG_FILE"

          if grep -q '^APPLICATION_VERSION=' "$CONFIG_FILE"; then
            sed -i "s|^APPLICATION_VERSION=.*|APPLICATION_VERSION=${IMAGE_TAG}|" "$CONFIG_FILE"
          else
            echo "APPLICATION_VERSION=${IMAGE_TAG}" >> "$CONFIG_FILE"
          fi

      - name: Compute commit message
        id: commit-message
        env:
          IMAGE_TAG: ${{ github.sha }}
          PREFIX: ${{ inputs.commit_message_prefix }}
          OVERLAY_DIR: ${{ steps.overlay.outputs.dir }}
        run: |
          SHORT_SHA="${IMAGE_TAG:0:12}"
          if [ -n "$PREFIX" ]; then
            echo "message=update ${PREFIX} image tag to ${SHORT_SHA} in ${OVERLAY_DIR}" >> "$GITHUB_OUTPUT"
          else
            echo "message=update image tag to ${SHORT_SHA} in ${OVERLAY_DIR}" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push changes
        uses: NeuralTrust/workflows/.github/actions/git-commit-push@main
        with:
          branch: ${{ github.ref_name }}
          message: ${{ steps.commit-message.outputs.message }}
          paths: |
            ${{ steps.overlay.outputs.dir }}/kustomization.yaml
            ${{ steps.overlay.outputs.dir }}/config.env

      - name: Deployment summary
        run: |
          OVERLAY_DIR="${{ steps.overlay.outputs.dir }}"
          IMAGE_TAG="${{ github.sha }}"

          {
            echo "## Deployment Updated"
            echo "- **Overlay:** \`${OVERLAY_DIR}\`"
            echo "- **Tag:** \`${IMAGE_TAG}\`"
            echo "- **Branch:** \`${{ github.ref_name }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  # ============================================================================
  # Job 3: Slack Notification
  # ============================================================================
  notify:
    name: Slack Notification
    needs: [build, update-kustomization]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Send Slack notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "No Slack webhook configured, skipping"
            exit 0
          fi

          BUILD="${{ needs.build.result }}"
          KUSTOMIZE="${{ needs.update-kustomization.result }}"

          if [ "$BUILD" = "success" ] && { [ "$KUSTOMIZE" = "success" ] || [ "$KUSTOMIZE" = "skipped" ]; }; then
            COLOR="#36a64f"
            STATUS="Deployed"
            EMOJI=":white_check_mark:"
          else
            COLOR="#dc3545"
            STATUS="Failed"
            EMOJI=":x:"
          fi

          PREFIX="${{ inputs.commit_message_prefix }}"
          IMAGES_LABEL="${PREFIX:-multi-image}"

          curl -sf "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "$(jq -n \
              --arg color "$COLOR" \
              --arg status "$STATUS" \
              --arg emoji "$EMOJI" \
              --arg repo "${{ github.repository }}" \
              --arg images "$IMAGES_LABEL" \
              --arg tag "${{ github.sha }}" \
              --arg branch "${{ github.ref_name }}" \
              --arg url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              --arg actor "${{ github.actor }}" \
              '{
                "attachments": [{
                  "color": $color,
                  "blocks": [
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": ($emoji + " *" + $status + "* | `" + $repo + "`")
                      }
                    },
                    {
                      "type": "section",
                      "fields": [
                        {"type": "mrkdwn", "text": ("*Images:*\n`" + $images + "`")},
                        {"type": "mrkdwn", "text": ("*Tag:*\n`" + ($tag | .[0:12]) + "`")},
                        {"type": "mrkdwn", "text": ("*Branch:*\n`" + $branch + "`")},
                        {"type": "mrkdwn", "text": ("*Workflow:*\n<" + $url + "|View Run>")}
                      ]
                    }
                  ]
                }]
              }'
            )" || echo "::warning::Slack notification failed"
