# ==============================================================================
# OpenSSF Scorecard — supply-chain posture for this CI repo
# ==============================================================================
# Scorecard audits repo-level security hygiene that lints can't see: branch
# protection, token permissions, pinned dependencies, dangerous workflow
# patterns, code review enforcement, and more.
#
# NOTES:
#   - `publish_results` is disabled by default so this is safe on private /
#     internal repos. If this repo is (or becomes) PUBLIC, set it to true to
#     publish to the OpenSSF API and enable a Scorecard badge.
#   - We don't have GitHub Advanced Security, so the SARIF can't go to the
#     Security tab — it's saved as a downloadable run artifact instead.
# ==============================================================================

name: OpenSSF Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "27 6 * * 1"  # Mondays 06:27 UTC
  push:
    branches: [main]
  workflow_dispatch:

permissions: read-all

concurrency:
  group: scorecard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      id-token: write         # required only when publish_results is true
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: scorecard.sarif
          results_format: sarif
          publish_results: false

      # No GitHub Advanced Security → save SARIF as a downloadable artifact instead
      # of pushing to the Security tab. Short retention keeps storage negligible.
      - name: Save Scorecard SARIF report as artifact
        if: always() && hashFiles('scorecard.sarif') != ''
        uses: actions/upload-artifact@v7
        with:
          name: scorecard-sarif
          path: scorecard.sarif
          retention-days: 7
